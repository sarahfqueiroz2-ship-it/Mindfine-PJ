<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mindfine - Painel da Escola</title>
    <!-- Importando a fonte Montserrat para combinar com os jogos -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --azul-bright: #32B5F1;
            --azul-escuro: #0277bd;
            --texto-cor: #1e293b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #000;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* FUNDO IGUAL AO DE JOGOS */
        .background-layer {
            position: fixed;
            width: 110%;
            height: 110%;
            background-image: url('fundos/fundo-a.png');
            background-size: cover;
            background-position: center;
            z-index: 1;
            left: -5%;
            top: -5%;
            filter: blur(8px) brightness(0.6);
        }

        /* PARTÍCULAS */
        #particles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        .bubble {
            position: absolute;
            bottom: -20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            animation: rise linear forwards;
        }

        @keyframes rise {
            to {
                transform: translateY(-110vh);
                opacity: 0;
            }
        }

        /* SIDEBAR (Estilo Glassmorphism para combinar com o fundo) */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 260px;
            height: 100vh;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            box-shadow: 2px 0 12px rgba(0, 0, 0, 0.2);
            padding: 24px 0;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        /* Logo removida conforme pedido */

        .sidebar-nav {
            flex: 1;
            padding: 0 12px;
            overflow-y: auto;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            margin-bottom: 4px;
            border-radius: 10px;
            color: #64748b;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .nav-item:hover {
            background: #f1f5f9;
            color: var(--azul-bright);
        }

        .nav-item.active {
            background: #e3f2fd;
            color: var(--azul-escuro);
            font-weight: 800;
        }

        .nav-item-icon {
            font-size: 20px;
            width: 24px;
            text-align: center;
        }

        /* CONTEÚDO PRINCIPAL */
        .main-content {
            position: relative;
            z-index: 10;
            margin-left: 260px;
            padding: 40px 20px;
        }

        /* CABEÇALHO (Estilo Games) */
        .page-header {
            background: white;
            color: var(--azul-escuro);
            padding: 25px 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .page-title {
            font-size: 24px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .page-subtitle {
            font-size: 14px;
            color: #666;
            font-weight: 600;
        }

        /* CARDS E SEÇÕES (Branco sólido com sombras de jogos) */
        .stat-card, .chart-section, .filters-container, .recommendations, .comparison-chart-vertical {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
            border: none;
            padding: 24px;
            margin-bottom: 24px;
            transition: 0.3s ease;
        }

        .stat-card:hover, .chart-section:hover {
            transform: translateY(-5px);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            color: var(--azul-escuro);
            margin-bottom: 4px;
        }

        .stat-label {
            color: #666;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
        }

        /* ELEMENTOS DE GRÁFICO */
        .chart-title, .filters-title, .recommendations-title {
            font-size: 18px;
            font-weight: 800;
            color: var(--azul-escuro);
            text-transform: uppercase;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .bar-container {
            height: 24px;
            background: #f0f0f0;
            border-radius: 12px;
        }

        .bar-fill.happy { background: linear-gradient(90deg, #fbbf24, #f59e0b); }
        .bar-fill.calm { background: linear-gradient(90deg, #10b981, #059669); }
        .bar-fill.sad { background: linear-gradient(90deg, #38bdf8, #0ea5e9); }
        .bar-fill.anxious { background: linear-gradient(90deg, #a855f7, #9333ea); }

        .filter-select {
            border: 2px solid #f0f0f0;
            border-radius: 12px;
            font-weight: 600;
            padding: 10px;
        }

        .compare-btn {
            background: var(--azul-escuro);
            font-weight: 800;
            text-transform: uppercase;
            border-radius: 15px;
            padding: 15px;
        }

        .alerts-section {
            background: #fff3cd;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
            border-left: 8px solid #ffc107;
        }

        /* Menu hambúrguer (mobile) */
        .menu-toggle {
            display: none;
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 200;
            background: white;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            border: none;
        }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); transition: 0.3s; }
            .sidebar.open { transform: translateX(0); }
            .menu-toggle { display: flex; }
            .main-content { margin-left: 0; padding: 20px 15px; margin-top: 60px; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
        }

        /* Restante dos estilos funcionais mantidos */
        .emotion-bars { display: flex; flex-direction: column; gap: 16px; }
        .emotion-bar { display: flex; align-items: center; gap: 12px; }
        .emotion-label { font-size: 13px; color: #475569; width: 70px; font-weight: 700; }
        .bar-percentage { font-size: 14px; font-weight: 800; color: var(--azul-escuro); width: 40px; }
        .filters-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
        .filter-group { display: flex; flex-direction: column; gap: 8px; }
        .filter-label { font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase; }
        .vertical-bars-container { display: flex; justify-content: space-around; align-items: flex-end; height: 300px; padding-top: 40px; }
        .vertical-bar { width: 35px; border-radius: 8px 8px 0 0; position: relative; }
        .vertical-bar.current { background: var(--azul-bright); }
        .vertical-bar.historical { background: #cbd5e1; }
        .bar-value { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); font-weight: 800; font-size: 12px; }
    </style>
</head>

<body>
    <!-- Camada de Fundo Animada -->
    <div class="background-layer"></div>
    <div id="particles-container"></div>

    <aside class="sidebar" id="sidebar">
        <!-- Logo removida aqui -->
        <nav class="sidebar-nav">
            <a href="inicio-escola.html" class="nav-item active">
                <span class="nav-item-icon"></span>
                <span>Painel da Escola</span>
            </a>
            <a href="login.html" class="nav-item" style="margin-top: auto; color: #ef4444;">
                <span class="nav-item-icon"></span>
                <span>Sair</span>
            </a>
        </nav>
    </aside>

    <button class="menu-toggle" id="menuToggle">
        <span>☰</span>
    </button>

    <main class="main-content">
        <div class="page-header">
            <h1 class="page-title">Painel da Escola</h1>
            <p class="page-subtitle">Acompanhamento do bem-estar em tempo real</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value">87%</div>
                <div class="stat-label">Participação</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">23</div>
                <div class="stat-label">Alunos Ativos</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">3</div>
                <div class="stat-label">Alertas</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">7.8</div>
                <div class="stat-label">Bem-estar Médio</div>
            </div>
        </div>

        <div class="filters-container">
            <h3 class="filters-title"> Filtros de Visualização</h3>
            <div class="filters-grid">
                <div class="filter-group">
                    <label class="filter-label">Período</label>
                    <select class="filter-select" id="filterPeriod">
                        <option value="day">Dia</option>
                        <option value="week" selected>Semana</option>
                        <option value="month">Mês</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label class="filter-label">Ano Escolar</label>
                    <select class="filter-select" id="filterYear">
                        <option value="all" selected>Todos os Anos</option>
                        <option value="1">1º Ano</option>
                        <option value="2">2º Ano</option>
                        <option value="3">3º Ano</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label class="filter-label">Curso</label>
                    <select class="filter-select" id="filterCourse">
                        <option value="all" selected>Todos os Cursos</option>
                        <option value="informatica">Informática</option>
                        <option value="administracao">Administração</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="chart-section">
            <h3 class="chart-title"> Distribuição Emocional</h3>
            <div class="emotion-bars">
                <div class="emotion-bar">
                    <span class="emotion-label">Feliz</span>
                    <div class="bar-container" style="flex:1">
                        <div class="bar-fill happy" style="width: 45%; height:100%; border-radius:12px"></div>
                    </div>
                    <span class="bar-percentage">45%</span>
                </div>
                <div class="emotion-bar">
                    <span class="emotion-label">Calmo</span>
                    <div class="bar-container" style="flex:1">
                        <div class="bar-fill calm" style="width: 30%; height:100%; border-radius:12px"></div>
                    </div>
                    <span class="bar-percentage">30%</span>
                </div>
                <div class="emotion-bar">
                    <span class="emotion-label">Triste</span>
                    <div class="bar-container" style="flex:1">
                        <div class="bar-fill sad" style="width: 15%; height:100%; border-radius:12px"></div>
                    </div>
                    <span class="bar-percentage">15%</span>
                </div>
                <div class="emotion-bar">
                    <span class="emotion-label">Ansioso</span>
                    <div class="bar-container" style="flex:1">
                        <div class="bar-fill anxious" style="width: 10%; height:100%; border-radius:12px"></div>
                    </div>
                    <span class="bar-percentage">10%</span>
                </div>
            </div>
        </div>

        <div class="recommendations" id="recommendationsSection">
            <h3 class="recommendations-title"> Recomendações Dinâmicas</h3>
            <div id="recommendationsContainer">
                <!-- Conteúdo dinâmico via JS -->
            </div>
        </div>
    </main>

    <script>
        // Lógica de Partículas (Igual à Sala de Jogos)
        function createBubble() {
            const container = document.getElementById('particles-container');
            const b = document.createElement('div');
            b.className = 'bubble';
            const size = Math.random() * 20 + 5;
            b.style.width = size + 'px'; 
            b.style.height = size + 'px';
            b.style.left = Math.random() * 100 + '%';
            b.style.animationDuration = (Math.random() * 5 + 8) + 's';
            container.appendChild(b);
            setTimeout(() => b.remove(), 10000);
        }
        setInterval(createBubble, 1500);

        // Toggle Sidebar Mobile
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        menuToggle.addEventListener('click', () => {
            sidebar.classList.toggle('open');
        });

        // Simulação de recomendações
        function loadRecs() {
            const container = document.getElementById('recommendationsContainer');
            const recs = [
                "Realizar uma pausa ativa de 5 minutos com a turma de Informática.",
                "Promover roda de conversa sobre ansiedade pré-provas para o 3º ano.",
                "Parabenizar a turma de Administração pelo alto índice de felicidade."
            ];
            container.innerHTML = recs.map((r, i) => 
                `<p style="margin-bottom:12px; font-size:14px; font-weight:600; color:#444">
                    <strong>${i+1}.</strong> ${r}
                </p>`).join('');
        }
        loadRecs();
    </script>
</body>
</html>
