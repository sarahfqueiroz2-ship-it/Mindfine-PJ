<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mindfine - Chat de Apoio</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
             :root {
            --azul-bright: #32B5F1;
            --azul-escuro: #0277bd;
            --bg-glass: rgba(255, 255, 255, 0.9);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            background: #000;
        }

        /* BACKGROUND & PARTICLES */
        .background-layer {
            position: fixed; width: 110%; height: 110%;
            background-image: url('fundos/fundo-a.png'); 
            background-size: cover; background-position: center;
            z-index: 1; left: -5%; top: -5%;
            filter: blur(8px) brightness(0.6);
        }

        #particles-container { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; z-index: 2; 
        }
        
        .bubble { 
            position: absolute; bottom: -20px; background: rgba(255,255,255,0.2); 
            border-radius: 50%; animation: rise linear forwards; 
        }
        
        @keyframes rise { 
            to { transform: translateY(-110vh); opacity: 0; } 
        }

        .main-content {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* HEADER RESPONSIVO */
        .diary-header {
            background: white; 
            padding: 12px 20px;
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            gap: 10px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.2);
            z-index: 500;
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        
        .header-left { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            flex-wrap: wrap;
            flex: 1;
        }
        
        .back-btn { 
            color: #ef4444; 
            font-size: 0.9rem; 
            cursor: pointer; 
            border: none; 
            background: none; 
            text-decoration: none; 
            display: flex; 
            align-items: center; 
            gap: 6px; 
            font-weight: 600;
            white-space: nowrap;
        }
        
        .diary-title h2 { 
            margin: 0; 
            font-size: 0.9rem; 
            color: var(--azul-escuro); 
            font-weight: 800; 
            text-transform: uppercase;
            white-space: nowrap;
        }

        /* LAYOUT RESPONSIVO */
        .chat-layout {
            flex: 1;
            display: flex;
            padding: 15px;
            gap: 15px;
            overflow: hidden;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
        }

        /* LISTA DE CONVERSAS - RESPONSIVA */
        .conversations-list {
            width: 320px;
            min-width: 280px;
            background: var(--bg-glass);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: all 0.3s ease;
        }

           .conv-header {
            padding: 15px;
            background: white;
            border-bottom: 2px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .conv-header h3 {
            color: var(--azul-escuro);
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.85rem;
            margin: 0;
        }

                .conv-count {
            background: var(--azul-bright);
            color: white;
            border-radius: 20px;
            padding: 2px 10px;
            font-size: 0.7rem;
            font-weight: 700;
        }


        .filter-tabs { 
            display: flex; 
            gap: 5px; 
            flex-wrap: wrap;
        }
        
        .filter-tab {
            flex: 1;
            padding: 6px 8px;
            border: 1px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            color: #666;
            text-align: center;
            white-space: nowrap;
        }
        
        .filter-tab.active { 
            background: var(--azul-bright); 
            color: white; 
            border-color: var(--azul-bright); 
        }

        .conversations-body { 
            flex: 1; 
            overflow-y: auto; 
            padding: 10px; 
        }

        /* CARDS DE CONVERSA */
        .conversation-item {
            background: white;
            border-radius: 15px;
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: 0.3s;
            border: 2px solid transparent;
        }
        
        .conversation-item:hover { transform: translateX(5px); }
        .conversation-item.active { border-color: var(--azul-bright); background: #f0faff; }
        .conversation-item.urgent { border-left: 5px solid #ef4444; }

        .conv-info-top { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            margin-bottom: 5px; 
            flex-wrap: wrap;
            gap: 5px;
        }
        
        .conv-name { 
            font-weight: 800; 
            color: var(--azul-escuro); 
            font-size: 0.8rem;
            word-break: break-word;
        }
        
        .conv-time { 
            font-size: 0.65rem; 
            color: #999; 
        }
        
        .conv-preview { 
            font-size: 0.7rem; 
            color: #666; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
        }

        /* BOTÕES DENTRO DO CARD */
        .conversation-actions {
            display: flex;
            gap: 5px;
            margin-top: 10px;
            padding-top: 8px;
            border-top: 1px solid #f0f0f0;
            flex-wrap: wrap;
        }

        .conversation-action-btn {
            flex: 1;
            padding: 5px 4px;
            border: 1px solid #e0e0e0;
            background: white;
            border-radius: 6px;
            font-size: 8px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
            white-space: nowrap;
        }

        .urgent-btn { color: #ef4444; border-color: #fee2e2; }
        .urgent-btn.active { background: #fee2e2; }
        .resolve-btn { color: #10b981; border-color: #d1fae5; }
        .reopen-btn { color: var(--azul-bright); border-color: #e3f2fd; }

        /* ÁREA DO CHAT */
        .chat-area {
            flex: 1;
            background: var(--bg-glass);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            min-width: 0;
        }

        .chat-main-header {
            padding: 12px 20px;
            background: white;
            border-bottom: 2px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .chat-user-info {
            min-width: 0;
            flex: 1;
        }
        
        .conv-name { 
            font-size: 0.9rem; 
            word-break: break-word;
        }
        
        #chatUserStatus { 
            font-size: 0.65rem; 
            color: #10b981; 
            font-weight: 600; 
        }

        .chat-messages {
            flex: 1; 
            padding: 20px; 
            overflow-y: auto; 
            background: rgba(255,255,255,0.5);
        }

        .message { margin-bottom: 12px; display: flex; }
        .message.student { justify-content: flex-start; }
        .message.professional { justify-content: flex-end; }
        
        .message-content {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 18px;
            font-size: 0.8rem;
            line-height: 1.4;
            font-weight: 500;
            word-break: break-word;
        }
        
        .message.student .message-content { 
            background: white; 
            color: #333; 
            border-bottom-left-radius: 4px; 
        }
        
        .message.professional .message-content { 
            background: var(--azul-bright); 
            color: white; 
            border-bottom-right-radius: 4px; 
        }
        
        .message-time {
            font-size: 0.55rem;
            opacity: 0.7;
            margin-top: 4px;
            display: block;
        }

        /* INPUT ÁREA */
        .chat-input-area {
            padding: 12px 15px;
            background: white;
            display: flex;
            align-items: flex-end;
            gap: 10px;
            border-top: 1px solid #f0f0f0;
        }

        .chat-input {
            flex: 1; 
            border: 2px solid #f0f0f0; 
            border-radius: 15px;
            padding: 10px 15px; 
            font-family: inherit; 
            resize: none;
            min-height: 40px; 
            max-height: 100px; 
            outline: none; 
            font-size: 0.85rem;
        }

        .send-btn-chat {
            background: var(--azul-escuro); 
            color: white; 
            border: none;
            border-radius: 15px; 
            padding: 0 20px; 
            font-weight: 800;
            cursor: pointer; 
            text-transform: uppercase; 
            font-size: 0.7rem;
            height: 44px;
            display: flex; 
            align-items: center; 
            justify-content: center;
            flex-shrink: 0; 
            transition: 0.3s;
            white-space: nowrap;
        }
        
        .send-btn-chat:hover {
            background: var(--azul-bright);
        }

        /* BADGES */
        .status-badge { 
            font-size: 7px; 
            padding: 2px 5px; 
            border-radius: 4px; 
            font-weight: 800; 
            text-transform: uppercase; 
            margin-top: 5px; 
            display: inline-block; 
        }
        
        .status-badge.urgent { background: #fee2e2; color: #ef4444; }
        .status-badge.resolved { background: #d1fae5; color: #10b981; }
        .unread-badge { 
            background: #ef4444; 
            color: white; 
            border-radius: 50%; 
            padding: 2px 5px; 
            font-size: 8px; 
        }

        .empty-state {
            height: 100%; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            color: #999;
            text-align: center;
            padding: 20px;
        }
        
        .empty-state i {
            font-size: 2.5rem;
            margin-bottom: 10px;
            opacity: 0.3;
        }
        
        .empty-state p {
            font-size: 0.8rem;
        }

               /* ========== RESPONSIVIDADE ========== */
        
        /* Telas médias (600px-900px) - mantém lado a lado mas reduz */
        @media (max-width: 900px) and (min-width: 601px) {
            .chat-layout {
                padding: 12px;
                gap: 12px;
            }
            
            .conversations-list {
                width: 240px;
                min-width: 240px;
            }
            
            .conv-name {
                font-size: 0.7rem;
            }
            
            .conv-preview {
                font-size: 0.6rem;
            }
            
            .conv-time {
                font-size: 0.55rem;
            }
            
            .conversation-action-btn {
                font-size: 0.55rem;
                padding: 4px 2px;
            }
            
            .message-content {
                max-width: 85%;
                font-size: 0.7rem;
                padding: 8px 12px;
            }
            
            .chat-main-header {
                padding: 10px 15px;
            }
            
            #chatUserName {
                font-size: 0.8rem;
            }
        }
        
        /* Telas pequenas (até 600px) - vira coluna */
        @media (max-width: 600px) {
            .diary-header {
                padding: 10px 15px;
            }
            
            .back-btn {
                font-size: 0.75rem;
            }
            
            .diary-title h2 {
                font-size: 0.75rem;
                white-space: normal;
            }
            
            .chat-layout {
                padding: 10px;
                gap: 10px;
                flex-direction: column;
            }
            
            /* Lista de conversas em cima */
            .conversations-list {
                width: 100%;
                min-width: auto;
                max-height: 220px;
            }
            
            .conversations-body {
                display: flex;
                flex-direction: row;
                overflow-x: auto;
                gap: 10px;
                padding: 10px;
            }
            
            .conversation-item {
                min-width: 200px;
                flex-shrink: 0;
                margin-bottom: 0;
            }
            
            /* Remove ações dos cards em mobile (deixa só o essencial) */
            .conversation-actions {
                display: none;
            }
            
            .chat-area {
                min-height: 300px;
            }
            
            .chat-messages {
                padding: 15px;
            }
            
            .message-content {
                max-width: 90%;
                font-size: 0.7rem;
                padding: 8px 12px;
            }
            
            .send-btn-chat {
                padding: 0 12px;
                font-size: 0.6rem;
                height: 38px;
            }
            
            .chat-input {
                font-size: 0.75rem;
                padding: 8px 12px;
            }
        }
        
        /* Telas muito pequenas (até 400px) */
        @media (max-width: 400px) {
            .header-left {
                gap: 6px;
            }
            
            .back-btn {
                font-size: 0.65rem;
            }
            
            .diary-title h2 {
                font-size: 0.65rem;
            }
            
            .conversation-item {
                min-width: 160px;
            }
            
            .conv-name {
                font-size: 0.65rem;
            }
            
            .conv-preview {
                font-size: 0.55rem;
            }
        }

                .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .clear-btn {
            background: none;
            border: none;
            color: #ef4444;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 5px;
            border-radius: 8px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .clear-btn:hover {
            background: #fee2e2;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <div class="background-layer"></div>
    <div id="particles-container"></div>

    <div class="main-content">
                <header class="diary-header">
            <div class="header-left">
                <a href="login.html" class="back-btn">
                    <i class="fas fa-sign-out-alt"></i> Sair
                </a>
                <div class="diary-title">
                    <h2>Atendimentos</h2>
                </div>
            </div>
            <div class="header-right">
                <button class="clear-btn" onclick="clearAllChats();">
                    <i class="fas fa-trash-alt"></i>
                </button>
            </div>
        </header>

        <div class="chat-layout">
                        <div class="conversations-list">
                <div class="conv-header">
                    <h3>Conversas</h3>
                    <span class="conv-count" id="convCount">0</span>
                </div>
                <div class="conversations-body" id="conversationsList"></div>
            </div>

            <div class="chat-area">
                <div class="chat-main-header" id="chatHeader" style="display: none;">
                    <div class="chat-user-info">
                        <div class="conv-name" id="chatUserName" style="font-size: 1rem;">Nome do Aluno</div>
                        <div id="chatUserStatus" style="font-size: 0.7rem; color: #10b981; font-weight: 600;">Online</div>
                    </div>
                    <button class="send-btn-chat" style="height: auto; padding: 8px 15px; font-size: 0.7rem;" onclick="viewProfile()">Ver Perfil</button>
                </div>

                <div class="chat-messages" id="chatMessages">
                    <div class="empty-state">
                        <i class="fas fa-comments" style="font-size: 3rem; margin-bottom: 15px; opacity: 0.2;"></i>
                        <p>Selecione um atendimento</p>
                    </div>
                </div>

                <div class="chat-input-area" id="chatInputArea" style="display: none;">
                    <textarea class="chat-input" id="messageInput" placeholder="Escreva sua mensagem..." rows="1"></textarea>
                    <button class="send-btn-chat" onclick="sendMessage()">Enviar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let conversations = [];
        let currentConversation = null;
        let currentFilter = 'all';
        let lastConversationsJSON = "";
        let lastMessagesLength = 0;

        function loadConversations() {
            return Object.values(JSON.parse(localStorage.getItem('professionalChats') || '{}'));
        }

               function renderConversations() {
            const container = document.getElementById('conversationsList');
            const filtered = conversations.filter(conv => {
                if (currentFilter === 'urgent') return conv.urgent && !conv.resolved;
                if (currentFilter === 'resolved') return conv.resolved;
                return !conv.resolved;
            });

            // Atualizar contador
            const convCount = document.getElementById('convCount');
            if (convCount) convCount.textContent = filtered.length;

            const currentJSON = JSON.stringify(filtered);
            if (currentJSON === lastConversationsJSON) return;
            lastConversationsJSON = currentJSON;

            if (filtered.length === 0) {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-comments"></i><p>Nenhuma conversa</p></div>`;
                return;
            }

            container.innerHTML = filtered.map(conv => `
                <div class="conversation-item ${conv.urgent ? 'urgent' : ''} ${currentConversation?.id === conv.id ? 'active' : ''}"
                     onclick="selectConversation('${conv.id}')">
                    <div class="conv-info-top">
                        <span class="conv-name">${conv.name} ${conv.unread > 0 ? `<span class="unread-badge">${conv.unread}</span>` : ''}</span>
                        <span class="conv-time">${conv.time}</span>
                    </div>
                    <div class="conv-preview">${conv.lastMessage || 'Inicie a conversa...'}</div>
                </div>
            `).join('');
        }

        function selectConversation(id) {
            const allChats = JSON.parse(localStorage.getItem('professionalChats') || '{}');
            currentConversation = allChats[id];
            if (!currentConversation) return;

            allChats[id].unread = 0;
            localStorage.setItem('professionalChats', JSON.stringify(allChats));

            document.getElementById('chatHeader').style.display = 'flex';
            document.getElementById('chatInputArea').style.display = 'flex';
            document.getElementById('chatUserName').innerText = currentConversation.name;
            
            lastMessagesLength = 0;
            renderMessages();
            renderConversations();
            document.getElementById('messageInput').focus();
        }

        function renderMessages() {
            const container = document.getElementById('chatMessages');
            if (!currentConversation) return;
            if (currentConversation.messages.length === lastMessagesLength) return;
            lastMessagesLength = currentConversation.messages.length;

            container.innerHTML = currentConversation.messages.map(msg => `
                <div class="message ${msg.sender}">
                    <div class="message-content">
                        ${msg.text}
                        <div class="message-time">${msg.time}</div>
                    </div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !currentConversation) return;

            const now = new Date();
            const time = `${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;

            currentConversation.messages.push({ sender: 'professional', text: text, time: time });
            currentConversation.lastMessage = text;
            currentConversation.time = time;

            const allChats = JSON.parse(localStorage.getItem('professionalChats') || '{}');
            allChats[currentConversation.id] = currentConversation;
            localStorage.setItem('professionalChats', JSON.stringify(allChats));

            input.value = '';
            input.style.height = '50px';
            renderMessages();
            renderConversations();
        }

        function toggleUrgent(id) {
            const allChats = JSON.parse(localStorage.getItem('professionalChats') || '{}');
            if (allChats[id]) {
                allChats[id].urgent = !allChats[id].urgent;
                localStorage.setItem('professionalChats', JSON.stringify(allChats));
                conversations = loadConversations();
                renderConversations();
            }
        }

        function markAsResolved(id) {
            if (confirm('Deseja finalizar este atendimento?')) {
                const allChats = JSON.parse(localStorage.getItem('professionalChats') || '{}');
                if (allChats[id]) {
                    allChats[id].resolved = true;
                    allChats[id].urgent = false;
                    localStorage.setItem('professionalChats', JSON.stringify(allChats));
                    if (currentConversation?.id === id) location.reload();
                    else { conversations = loadConversations(); renderConversations(); }
                }
            }
        }

        function reopenConversation(id) {
            const allChats = JSON.parse(localStorage.getItem('professionalChats') || '{}');
            if (allChats[id]) {
                allChats[id].resolved = false;
                localStorage.setItem('professionalChats', JSON.stringify(allChats));
                conversations = loadConversations();
                renderConversations();
            }
        }

        function viewProfile() {
            if (currentConversation.anonymous) alert("Perfil Protegido (Anônimo)");
            else alert(`Aluno: ${currentConversation.name}\nMatrícula: ${currentConversation.registration}`);
        }

        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                renderConversations();
            });
        });

        document.getElementById('messageInput').addEventListener('input', function() {
            this.style.height = '50px';
            this.style.height = (this.scrollHeight) + 'px';
        });

        function createBubble() {
            const container = document.getElementById('particles-container');
            const b = document.createElement('div');
            b.className = 'bubble';
            const size = Math.random() * 20 + 5;
            b.style.width = size + 'px'; b.style.height = size + 'px';
            b.style.left = Math.random() * 100 + '%';
            b.style.animationDuration = (Math.random() * 5 + 8) + 's';
            container.appendChild(b);
            setTimeout(() => b.remove(), 10000);
        }

        setInterval(() => {
            conversations = loadConversations();
            renderConversations();
            if (currentConversation) {
                const updated = conversations.find(c => c.id === currentConversation.id);
                if (updated) { currentConversation = updated; renderMessages(); }
            }
        }, 1500);

        setInterval(createBubble, 1500);
        conversations = loadConversations();
        renderConversations();

        document.getElementById('messageInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });

        function clearAllChats() {
    if (confirm('Deseja realmente limpar todas as conversas? Esta ação não pode ser desfeita.')) {
        localStorage.removeItem('professionalChats');
        conversations = [];
        currentConversation = null;
        location.reload();
    }
}
    </script>
</body>
</html>
