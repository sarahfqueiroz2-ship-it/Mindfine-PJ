<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mindfine — Turmas</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --azul-bright: #32B5F1;
            --azul-escuro: #0277bd;
            --texto-cor: #1e293b;

            --sky: #32B5F1;
            --ocean: #4795c2;
            --deep: #0097dd;
            --border: rgba(50,181,241,0.12);
            --surface: #ffffff;
            --surface2: #f1f9ff;
            --text: #1e293b;
            --muted: #64748b;
            --happy: #fbbf24;
            --calm: #34d399;
            --sad: #60a5fa;
            --anxious: #8b5cf6;
            --alert: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #000;
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--texto-cor);
        }

        /* ── FUNDO (igual ao inicio-escola) ── */
        .background-layer {
            position: fixed;
            width: 110%; height: 110%;
            background-image: url('fundo-a.png');
            background-size: cover;
            background-position: center;
            z-index: 1;
            left: -5%; top: -5%;
            filter: blur(8px) brightness(0.6);
        }

        /* ── PARTÍCULAS (bolhas) ── */
        #particles-container {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 2;
        }
        .bubble {
            position: absolute; bottom: -20px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            animation: rise linear forwards;
        }
        @keyframes rise {
            to { transform: translateY(-110vh); opacity: 0; }
        }

        /* ── SIDEBAR ── */
        .sidebar {
            position: fixed; left: 0; top: 0;
            width: 240px; height: 100vh;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(0,0,0,0.08);
            display: flex; flex-direction: column;
            z-index: 100; padding: 32px 0;
        }
        .sidebar-logo {
            padding: 0 24px 32px;
            border-bottom: 1px solid rgba(0,0,0,0.08);
            margin-bottom: 16px;
        }
        .logo-mark { display: flex; align-items: center; gap: 10px; }
        .logo-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--azul-bright), var(--azul-escuro));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

.logo-icon img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 10px;
}
        .logo-text {
            font-weight: 800; font-size: 18px;
            background: linear-gradient(90deg, var(--azul-bright), var(--azul-escuro));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .sidebar-nav {
            flex: 1; padding: 0 12px;
            display: flex; flex-direction: column; gap: 4px;
        }
        .nav-section-label {
            font-size: 10px; font-weight: 800; color: var(--muted);
            text-transform: uppercase; letter-spacing: 0.12em;
            padding: 16px 12px 8px;
        }
        .nav-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px; border-radius: 10px;
            color: #64748b; font-size: 14px; font-weight: 600;
            cursor: pointer; transition: all 0.2s ease;
            text-decoration: none; position: relative;
            margin-bottom: 4px;
        }
        .nav-item:hover { background: #f1f5f9; color: var(--azul-bright); }
        .nav-item.active {
            background: #e3f2fd; color: var(--azul-escuro); font-weight: 800;
        }
        .nav-item.active::before {
            content: ''; position: absolute;
            left: 0; top: 50%; transform: translateY(-50%);
            width: 3px; height: 18px;
            background: var(--azul-bright); border-radius: 0 2px 2px 0;
        }
        .nav-badge {
            margin-left: auto;
            background: #b8d1ff; color: #0059ff;
            font-size: 10px; font-weight: 700;
            padding: 2px 7px; border-radius: 20px;
        }
        .sidebar-footer {
            padding: 16px 12px 0;
            border-top: 1px solid rgba(0,0,0,0.08); margin-top: 8px;
        }
        .user-card {
            display: flex; align-items: center; gap: 12px;
            padding: 12px; border-radius: 12px; background: var(--surface2);
        }
        .user-avatar {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--azul-bright), var(--azul-escuro));
            border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
            font-size: 14px; font-weight: 700; color: #fff; flex-shrink: 0;
        }
        .user-info-name { font-size: 13px; font-weight: 600; color: var(--texto-cor); }
        .user-info-role { font-size: 11px; color: var(--muted); }

        /* ── MENU TOGGLE ── */
        .menu-toggle {
            display: none; position: fixed; top: 20px; left: 20px;
            z-index: 200; background: white;
            width: 44px; height: 44px; border-radius: 12px;
            cursor: pointer; align-items: center; justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); border: none;
            font-size: 18px;
        }

        /* ── MAIN CONTENT ── */
        .main-content {
            position: relative; z-index: 10;
            margin-left: 240px; padding: 40px 32px; min-height: 100vh;
        }

        /* ── HEADER ── */
        .page-header {
            background: white;
            color: var(--azul-escuro);
            padding: 25px 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            display: flex; align-items: flex-start;
            justify-content: space-between; gap: 20px; flex-wrap: wrap;
        }
        .header-left h1 {
            font-size: 24px; font-weight: 800;
            text-transform: uppercase; margin-bottom: 4px;
            color: var(--azul-escuro);
        }
        .header-left h1 span {
            background: linear-gradient(90deg, var(--azul-bright), var(--azul-escuro));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .header-left p { font-size: 14px; color: #666; font-weight: 600; }
        .header-right { display: flex; align-items: center; gap: 12px; }

        /* ── BOTÕES ── */
        .btn-primary {
            background: linear-gradient(135deg, var(--azul-bright), var(--azul-escuro));
            color: #fff; border: none;
            padding: 10px 20px; border-radius: 10px;
            font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 700;
            cursor: pointer; transition: all 0.2s; letter-spacing: 0.02em;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(50,181,241,0.4);
        }
        .btn-ghost {
            background: white; color: #64748b;
            border: 2px solid #e2e8f0;
            padding: 10px 18px; border-radius: 10px;
            font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-ghost:hover { border-color: var(--azul-bright); color: var(--azul-bright); }

        /* ── FADE IN ── */
        .fade-in { opacity: 0; transform: translateY(16px); animation: fadeInUp 0.5s ease forwards; }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        .delay-1 { animation-delay: 0.05s; }
        .delay-2 { animation-delay: 0.10s; }
        .delay-3 { animation-delay: 0.15s; }

        /* ── SUMMARY STRIP ── */
        .summary-strip {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 20px; margin-bottom: 30px;
        }
        .summary-chip {
            background: white; border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            padding: 20px 22px;
            display: flex; align-items: center; gap: 14px;
            transition: all 0.3s ease;
        }
        .summary-chip:hover { transform: translateY(-5px); }
        .chip-icon {
            width: 44px; height: 44px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; flex-shrink: 0;
        }
        .chip-icon.blue   { background: rgba(50,181,241,0.12); }
        .chip-icon.green  { background: rgba(52,211,153,0.12); }
        .chip-icon.purple { background: rgba(139,92,246,0.12); }
        .chip-icon.yellow { background: rgba(251,191,36,0.12); }
        .chip-value { font-size: 32px; font-weight: 800; color: var(--azul-escuro); line-height: 1; margin-bottom: 2px; }
        .chip-label { font-size: 11px; color: #666; font-weight: 800; text-transform: uppercase; }

        /* ── TOOLBAR ── */
        .toolbar {
            background: white; border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            padding: 20px 24px;
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 24px; flex-wrap: wrap;
        }
        .search-box {
            display: flex; align-items: center; gap: 10px;
            background: #f8fafc; border: 2px solid #f0f0f0;
            border-radius: 12px; padding: 10px 16px; flex: 1; min-width: 200px;
        }
        .search-box input {
            background: transparent; border: none;
            color: var(--texto-cor); font-family: 'Montserrat', sans-serif;
            font-size: 14px; outline: none; width: 100%; font-weight: 600;
        }
        .search-box input::placeholder { color: var(--muted); font-weight: 400; }
        .search-icon { color: var(--muted); font-size: 16px; }

        .filter-chip {
            display: flex; align-items: center; gap: 6px;
            padding: 8px 14px; border-radius: 12px;
            border: 2px solid #f0f0f0; background: #f8fafc;
        }
        .filter-chip label {
            font-size: 10px; color: var(--muted);
            text-transform: uppercase; letter-spacing: 0.08em;
            font-weight: 800; white-space: nowrap;
        }
        .filter-chip select {
            background: transparent; border: none;
            color: var(--texto-cor); font-family: 'Montserrat', sans-serif;
            font-size: 13px; font-weight: 600; cursor: pointer; outline: none;
        }
        .view-toggle {
            display: flex; background: #f8fafc;
            border: 2px solid #f0f0f0; border-radius: 12px; overflow: hidden;
        }
        .view-btn {
            padding: 10px 14px; background: transparent; border: none;
            color: var(--muted); cursor: pointer; font-size: 16px; transition: all 0.2s;
        }
        .view-btn.active { background: #e3f2fd; color: var(--azul-escuro); }

        /* ── CLASS CARDS GRID ── */
        .classes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        .class-card {
            background: white; border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            overflow: hidden; cursor: pointer; transition: all 0.3s ease;
        }
        .class-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,0,0,0.25); }

        .card-accent { height: 5px; width: 100%; }
        .accent-blue   { background: linear-gradient(90deg, #32B5F1, #60a5fa); }
        .accent-green  { background: linear-gradient(90deg, #34d399, #10b981); }
        .accent-purple { background: linear-gradient(90deg, #a78bfa, #8b5cf6); }
        .accent-yellow { background: linear-gradient(90deg, #fbbf24, #f59e0b); }
        .accent-rose   { background: linear-gradient(90deg, #f87171, #ef4444); }
        .accent-teal   { background: linear-gradient(90deg, #2dd4bf, #0d9488); }

        .card-body { padding: 20px 22px; }
        .card-top {
            display: flex; align-items: flex-start;
            justify-content: space-between; margin-bottom: 16px; gap: 10px;
        }
        .class-name { font-size: 17px; font-weight: 800; color: var(--texto-cor); margin-bottom: 4px; }
        .class-meta {
            font-size: 12px; color: var(--muted);
            display: flex; align-items: center; gap: 6px; font-weight: 600;
        }
        .meta-dot { width: 3px; height: 3px; background: var(--muted); border-radius: 50%; }

        .wellbeing-badge { display: flex; flex-direction: column; align-items: flex-end; flex-shrink: 0; }
        .wellbeing-score { font-size: 22px; font-weight: 800; line-height: 1; }
        .wellbeing-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 800; }
        .score-high { color: #10b981; }
        .score-mid  { color: #f59e0b; }
        .score-low  { color: #ef4444; }

        /* Emotion mini-bars */
        .mini-emotions { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; }
        .mini-row { display: flex; align-items: center; gap: 8px; }
        .mini-emoji { font-size: 13px; width: 18px; text-align: center; }
        .mini-track { flex: 1; height: 7px; background: #f0f4f8; border-radius: 4px; overflow: hidden; }
        .mini-fill { height: 100%; border-radius: 4px; transition: width 1s ease; }
        .mini-pct { font-size: 11px; font-weight: 800; color: var(--muted); width: 28px; text-align: right; }

        .bar-fill.happy   { background: linear-gradient(90deg, #fbbf24, #f59e0b); }
        .bar-fill.calm    { background: linear-gradient(90deg, #10b981, #059669); }
        .bar-fill.sad     { background: linear-gradient(90deg, #38bdf8, #0ea5e9); }
        .bar-fill.anxious { background: linear-gradient(90deg, #a855f7, #9333ea); }

        /* Card footer */
        .card-footer {
            display: flex; align-items: center;
            justify-content: space-between;
            padding-top: 16px; border-top: 1px solid #f0f4f8;
        }
        .student-faces { display: flex; }
        .face-bubble {
            width: 26px; height: 26px; border-radius: 50%;
            border: 2px solid white; display: flex;
            align-items: center; justify-content: center;
            font-size: 10px; font-weight: 800; color: #fff;
            margin-left: -6px;
        }
        .face-bubble:first-child { margin-left: 0; }
        .face-count { font-size: 11px; color: var(--muted); font-weight: 800; margin-left: 8px; }
        .alert-tag {
            font-size: 11px; font-weight: 800;
            padding: 4px 10px; border-radius: 20px;
        }
        .alert-tag.has-alerts { background: rgba(239,68,68,0.1); color: #ef4444; border: 1px solid rgba(239,68,68,0.2); }
        .alert-tag.no-alerts  { background: rgba(52,211,153,0.1); color: #10b981; border: 1px solid rgba(52,211,153,0.2); }

        /* ── LIST VIEW ── */
        .classes-list { display: flex; flex-direction: column; gap: 12px; }
        .list-row {
            background: white; border-radius: 14px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            padding: 16px 20px;
            display: flex; align-items: center; gap: 16px;
            cursor: pointer; transition: all 0.2s;
        }
        .list-row:hover { transform: translateX(3px); box-shadow: 0 10px 25px rgba(0,0,0,0.15); }
        .list-accent { width: 4px; height: 44px; border-radius: 4px; flex-shrink: 0; }
        .list-info { flex: 1; }
        .list-name { font-size: 15px; font-weight: 800; color: var(--texto-cor); }
        .list-meta { font-size: 12px; color: var(--muted); margin-top: 2px; font-weight: 600; }
        .list-students { font-size: 12px; color: var(--muted); width: 80px; text-align: center; font-weight: 800; }
        .list-bar-wrap { width: 140px; }
        .list-bar-track { height: 6px; background: #f0f4f8; border-radius: 4px; overflow: hidden; }
        .list-bar-fill  { height: 100%; border-radius: 4px; transition: width 1s ease; }
        .list-arrows { color: var(--muted); font-size: 16px; }

        /* ── MODAL / DRAWER ── */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 300;
            background: rgba(0,0,0,0.65); backdrop-filter: blur(4px);
            display: flex; align-items: flex-start; justify-content: flex-end;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .modal-overlay.open { opacity: 1; pointer-events: all; }
        .drawer {
            width: 480px; height: 100vh;
            background: white; border-left: 1px solid #e2e8f0;
            overflow-y: auto;
            transform: translateX(100%);
            transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
        }
        .modal-overlay.open .drawer { transform: translateX(0); }

        .drawer-header {
            padding: 28px 28px 20px;
            border-bottom: 1px solid #f0f4f8;
            position: sticky; top: 0; background: white; z-index: 10;
            display: flex; align-items: center; justify-content: space-between;
        }
        .drawer-close {
            width: 34px; height: 34px;
            background: #f1f5f9; border: none; border-radius: 10px;
            color: var(--muted); font-size: 18px; cursor: pointer;
            transition: color 0.2s; display: flex; align-items: center; justify-content: center;
        }
        .drawer-close:hover { color: var(--texto-cor); }
        .drawer-body { padding: 24px 28px; }
        .drawer-class-name { font-size: 22px; font-weight: 800; color: var(--texto-cor); margin-bottom: 4px; }
        .drawer-class-meta { font-size: 13px; color: var(--muted); font-weight: 600; }

        .drawer-stats {
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            gap: 12px; margin: 20px 0;
        }
        .d-stat { background: #f8fafc; border-radius: 12px; padding: 14px 16px; text-align: center; }
        .d-stat-val { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
        .d-stat-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; font-weight: 800; }

        .section-heading {
            font-size: 13px; font-weight: 800; color: var(--muted);
            text-transform: uppercase; letter-spacing: .1em; margin: 24px 0 12px;
        }

       
        .s-sub  { font-size: 11px; color: var(--muted); font-weight: 600; }
        .tag-happy   { background: rgba(251,191,36,0.15);  color: #f59e0b; }
        .tag-calm    { background: rgba(52,211,153,0.15);  color: #10b981; }
        .tag-sad     { background: rgba(96,165,250,0.15);  color: #3b82f6; }
        .tag-anxious { background: rgba(167,139,250,0.15); color: #8b5cf6; }
        .tag-alert   { background: rgba(248,113,113,0.15); color: #ef4444; }

        .trend-row { display: flex; align-items: flex-end; gap: 5px; height: 60px; margin-top: 6px; }
        .trend-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .trend-bar { width: 100%; border-radius: 4px 4px 0 0; background: #e3f2fd; transition: height 0.8s ease; }
        .trend-bar.peak { background: var(--azul-bright); }
        .trend-day { font-size: 9px; color: var(--muted); font-weight: 800; }

        .emotion-pct.happy   { color: #f59e0b; }
        .emotion-pct.calm    { color: #10b981; }
        .emotion-pct.sad     { color: #3b82f6; }
        .emotion-pct.anxious { color: #8b5cf6; }

        /* ── MOBILE ── */
        @media (max-width: 1100px) { .summary-strip { grid-template-columns: 1fr 1fr; } }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); transition: 0.3s; }
            .sidebar.open { transform: translateX(0); }
            .menu-toggle { display: flex; }
            .main-content { margin-left: 0; padding: 72px 16px 32px; }
            .summary-strip { grid-template-columns: 1fr 1fr; }
            .drawer { width: 100vw; }
        }

        .nav-item i {
    width: 20px;
    height: 20px;
    stroke-width: 2;
    flex-shrink: 0;
}

.chip-icon i, .view-btn i, .btn-ghost i, .drawer-close i {
    width: 18px; height: 18px; flex-shrink: 0;
}
.chip-icon i { width: 20px; height: 20px; }
    </style>
</head>

<div class="background-layer"></div>
<div id="particles-container"></div>

<!-- ── SIDEBAR ── -->

        <div class="logo-mark">
            <div class="logo-icon">
                <img src="skin.png" alt="Logo">

            <span class="logo-text">Mindfine</span>
        </div>
    </div>
    <nav class="sidebar-nav">

        <a href="inicio-escola.html" class="nav-item">

        </a>
        <a href="turma.html" class="nav-item active">
            <i data-lucide="users"></i> Turmas
        </a>
        <a href="relatorio.html" class="nav-item">

        </a>
        <div class="nav-section-label">Gestão</div>

        <a href="intervencao.html" class="nav-item">

    </nav>
    <div class="sidebar-footer">
        <div class="user-card">

                <div class="user-info-name">Escola Painel</div>
                <div class="user-info-role">Administrador</div>
            </div>
        </div>

            <i data-lucide="log-out"></i> Sair

    </div>
</aside>

<button class="menu-toggle" id="menuToggle"><i data-lucide="menu"></i></button>

<!-- ── MAIN ── -->
<main class="main-content">

    <!-- Header -->
    <div class="page-header fade-in">
        <div class="header-left">
            <h1>Visão de <span>Turmas</span></h1>
            <p>9 turmas ativas · atualizado agora há pouco</p>
        </div>

                    <div class="wellbeing-badge">
                        <div class="wellbeing-score ${scoreClass(t.wellbeing)}">${t.wellbeing}</div>

${t.alertas > 0 ? `${t.alertas} alerta${t.alertas>1?'s':''}` : 'Sem alertas'}

function getFiltered() {

    const yr  = document.getElementById('filterYear')?.value  || 'all';
    const crs = document.getElementById('filterCourse')?.value || 'all';
    return turmas.filter(t =>
        (q === '' || t.nome.toLowerCase().includes(q) || t.curso.toLowerCase().includes(q)) &&
        (yr === 'all' || t.ano === yr) &&
        (crs === 'all' || t.curso === crs)
    );
}

    const list = getFiltered();

}

                        </div>
                        <div class="mini-track" style="height:8px">
                            <div class="mini-fill bar-fill ${e.cls}" data-t="${e.val}" style="width:0%"></div>
                        </div>
                    </div>
                </div>
            `).join('')}
        </div>

    <div class="section-heading">Resumo Emocional da Turma</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
            <div style="background:#fffbeb;border-radius:12px;padding:14px;text-align:center;">
                <div style="font-size:22px;font-weight:800;color:#f59e0b;">${t.emotions.happy}%</div>
                <div style="font-size:11px;font-weight:800;color:var(--muted);">😊 Felizes</div>
            </div>
            <div style="background:#f0fdf4;border-radius:12px;padding:14px;text-align:center;">
                <div style="font-size:22px;font-weight:800;color:#10b981;">${t.emotions.calm}%</div>
                <div style="font-size:11px;font-weight:800;color:var(--muted);">😌 Calmos</div>
            </div>
            <div style="background:#eff6ff;border-radius:12px;padding:14px;text-align:center;">
                <div style="font-size:22px;font-weight:800;color:#3b82f6;">${t.emotions.sad}%</div>
                <div style="font-size:11px;font-weight:800;color:var(--muted);">😢 Tristes</div>
            </div>
            <div style="background:#faf5ff;border-radius:12px;padding:14px;text-align:center;">
                <div style="font-size:22px;font-weight:800;color:#8b5cf6;">${t.emotions.anxious}%</div>
                <div style="font-size:11px;font-weight:800;color:var(--muted);">😰 Ansiosos</div>
            </div>
        </div>

        <div style="margin-top:24px;padding-top:20px;border-top:1px solid #f0f4f8;">
            <button class="btn-primary" style="width:100%;justify-content:center;display:flex;gap:8px" onclick="abrirRelatorioTurma(${t.id})">
                Ver relatório completo da turma
            </button>
        </div>
    `;

    document.getElementById('modalOverlay').classList.add('open');

    setTimeout(() => {
        t.trend.forEach((v,i) => {
            const el = document.getElementById(`tb${i}`);
            if (el) el.style.height = (v / maxTrend * 100) + '%';
        });
        document.querySelectorAll('#drawerBody [data-t]').forEach(el => {
            el.style.width = el.dataset.t + '%';
        });
    }, 100);

    lucide.createIcons();
}

function closeDrawer(e) {
    if (e.target === document.getElementById('modalOverlay')) closeDrawerBtn();
}
function closeDrawerBtn() {
    document.getElementById('modalOverlay').classList.remove('open');
}

// ── SIDEBAR TOGGLE ────────────────────────────────────
document.getElementById('menuToggle').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('open');
});
lucide.createIcons();

/* ── EXPORTAR CSV ── */
function exportarCSV() {
    const linhas = [['Turma','Curso','Ano','Período','Professor','Alunos','Bem-estar','Alertas','Feliz%','Calmo%','Triste%','Ansioso%']];
    turmas.forEach(t => {
        linhas.push([
            t.nome, t.curso, t.ano+'° Ano', t.periodo, t.professor,
            t.alunos, t.wellbeing, t.alertas,
            t.emotions.happy+'%', t.emotions.calm+'%',
            t.emotions.sad+'%',   t.emotions.anxious+'%'
        ]);
    });
    const csv  = linhas.map(l => l.join(',')).join('\n');
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = 'turmas-mindfine.csv'; a.click();
    URL.revokeObjectURL(url);
}

/* ── MODAL NOVA TURMA ── */
function abrirModalNovaTurma() {
    const overlay = document.getElementById('modalNovaTurma');
    overlay.classList.add('open');
    setTimeout(() => {
        document.getElementById('modalNovaTurmaBox').style.transform = 'scale(1)';
    }, 10);
    lucide.createIcons();
}

function fecharModalNovaTurma(e) {
    if (e.target === document.getElementById('modalNovaTurma')) fecharModalNovaTurmaBtn();
}

function fecharModalNovaTurmaBtn() {
    document.getElementById('modalNovaTurmaBox').style.transform = 'scale(0.92)';
    setTimeout(() => {
        document.getElementById('modalNovaTurma').classList.remove('open');
    }, 200);
}

function criarNovaTurma() {
    const ano    = document.getElementById('ntAno').value;
    const curso  = document.getElementById('ntCurso').value;
    const periodo= document.getElementById('ntPeriodo').value;
    const alunos = parseInt(document.getElementById('ntAlunos').value) || 25;
    const prof   = document.getElementById('ntProf').value.trim() || 'A definir';

    const siglas = { 'Administração':'ADM', 'Informática':'INF', 'Meio Ambiente':'MA' };
    const cores  = { 'Administração':'accent-blue', 'Informática':'accent-rose', 'Meio Ambiente':'accent-green' };
    const grads  = {
        'Administração': 'linear-gradient(90deg,#32B5F1,#60a5fa)',
        'Informática':   'linear-gradient(90deg,#f87171,#ef4444)',
        'Meio Ambiente': 'linear-gradient(90deg,#34d399,#10b981)'
    };

    const newId = Math.max(...turmas.map(t => t.id)) + 1;
    turmas.push({
        id: newId,
        nome: `${ano}° ${siglas[curso]}`,
        curso, ano, periodo,
        professor: prof,
        wellbeing: 7.0,
        alunos, alertas: 0,
        accent: cores[curso],
        accentColor: grads[curso],
        emotions: { happy: 40, calm: 30, sad: 15, anxious: 15 },
        trend: [7.0, 7.0, 7.0, 7.0, 7.0, 7.0, 7.0]
    });

    fecharModalNovaTurmaBtn();
    render();
}

/* ── MODAL RELATÓRIO DA TURMA ── */
function abrirRelatorioTurma(id) {
    const t = turmas.find(x => x.id === id);
    if (!t) return;

    // Fecha o drawer primeiro
    document.getElementById('modalOverlay').classList.remove('open');

    const overlay = document.getElementById('modalRelatorio');
    document.getElementById('relatorioBody').innerHTML = `
        <div style="margin-bottom:20px;">
            <div style="font-size:22px;font-weight:800;color:var(--texto-cor);">${t.nome} — ${t.curso}</div>
            <div style="font-size:13px;color:var(--muted);margin-top:4px;">${t.ano}º Ano · ${t.periodo} · ${t.professor}</div>
        </div>

        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;">
            <div style="background:#f8fafc;border-radius:12px;padding:16px;text-align:center;">
                <div style="font-size:26px;font-weight:800;" class="${scoreClass(t.wellbeing)}">${t.wellbeing}</div>
                <div style="font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;margin-top:2px;">Bem-estar</div>
            </div>
            <div style="background:#f8fafc;border-radius:12px;padding:16px;text-align:center;">
                <div style="font-size:26px;font-weight:800;color:var(--azul-bright);">${t.alunos}</div>
                <div style="font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;margin-top:2px;">Alunos</div>
            </div>
            <div style="background:#f8fafc;border-radius:12px;padding:16px;text-align:center;">
                <div style="font-size:26px;font-weight:800;color:${t.alertas>0?'#ef4444':'#10b981'};">${t.alertas}</div>
                <div style="font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;margin-top:2px;">Alertas</div>
            </div>
        </div>

        <div style="font-size:13px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;">Distribuição Emocional</div>
        ${[
            {emoji:'😊',label:'Feliz',  cls:'happy',  val:t.emotions.happy,  color:'#f59e0b'},
            {emoji:'😌',label:'Calmo',  cls:'calm',   val:t.emotions.calm,   color:'#10b981'},
            {emoji:'😢',label:'Triste', cls:'sad',    val:t.emotions.sad,    color:'#3b82f6'},
            {emoji:'😰',label:'Ansioso',cls:'anxious',val:t.emotions.anxious,color:'#8b5cf6'},
        ].map(e => `
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
                <span style="font-size:18px;">${e.emoji}</span>
                <div style="flex:1;">
                    <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
                        <span style="font-size:13px;font-weight:800;color:var(--texto-cor);">${e.label}</span>
                        <span style="font-size:13px;font-weight:800;color:${e.color};">${e.val}%</span>
                    </div>
                    <div style="height:10px;background:#f0f4f8;border-radius:6px;overflow:hidden;">
                        <div style="height:100%;border-radius:6px;width:${e.val}%;
                                    background:linear-gradient(90deg,${e.color},${e.color}aa);
                                    transition:width 1s ease;"></div>
                    </div>
                </div>
            </div>
        `).join('')}

        <div style="font-size:13px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin:20px 0 12px;">Tendência Semanal</div>
        <div style="display:flex;align-items:flex-end;gap:8px;height:100px;padding-top:20px;">
            ${t.trend.map((v,i) => {
                const max = Math.max(...t.trend);
                const pct = (v / max * 100);
                const dias = ['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
                return `
                <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;">
                    <div style="width:100%;height:${pct}%;border-radius:4px 4px 0 0;
                                background:${i===6?'var(--azul-bright)':'#dbe9f5'};
                                position:relative;min-height:4px;">
                        <span style="position:absolute;top:-18px;left:50%;transform:translateX(-50%);
                                     font-size:9px;font-weight:800;color:var(--azul-escuro);">${v}</span>
                    </div>
                    <span style="font-size:9px;color:var(--muted);font-weight:800;">${dias[i]}</span>
                </div>`;
            }).join('')}
        </div>

        <div style="margin-top:24px;padding:16px;background:${t.wellbeing>=7.5?'#f0fdf4':t.wellbeing>=6?'#fffbeb':'#fff8f8'};
                    border-radius:12px;border:1px solid ${t.wellbeing>=7.5?'rgba(52,211,153,0.3)':t.wellbeing>=6?'rgba(251,191,36,0.3)':'rgba(239,68,68,0.2)'};">
            <div style="font-size:13px;font-weight:800;color:${t.wellbeing>=7.5?'#10b981':t.wellbeing>=6?'#f59e0b':'#ef4444'};">
                ${t.wellbeing>=7.5?'✓ Turma em bom estado emocional':t.wellbeing>=6?'⚠ Turma requer atenção moderada':'⚠ Turma em estado crítico — intervenção recomendada'}
            </div>
            <div style="font-size:12px;color:var(--muted);margin-top:4px;font-weight:600;">
                ${t.alertas>0?`${t.alertas} alerta${t.alertas>1?'s ativos requerem':'ativo requer'} acompanhamento.`:'Nenhum alerta ativo no momento.'}
            </div>
        </div>
    `;

    overlay.classList.add('open');
    setTimeout(() => {
        document.getElementById('modalRelatorioBox').style.transform = 'scale(1)';
    }, 10);
}

function fecharRelatorio(e) {
    if (e && e.target !== document.getElementById('modalRelatorio')) return;
    fecharRelatorioBtn();
}
function fecharRelatorioBtn() {
    document.getElementById('modalRelatorioBox').style.transform = 'scale(0.92)';
    setTimeout(() => {
        document.getElementById('modalRelatorio').classList.remove('open');
    }, 200);
}

// ── INIT ──────────────────────────────────────────────
render();
</script>
</body>
</html>
