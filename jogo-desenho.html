<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mindfine Studio - Arte</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        :root {
            --azul-bright: #32B5F1;
            --azul-escuro: #0277bd;
            --branco: #ffffff;
            --texto: #2c3e50;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Montserrat', sans-serif;
            background: #000;
            height: 100vh; overflow: hidden;
        }

        .background-layer {
            position: fixed; width: 110%; height: 110%;
            background-image: url('fundos/fundo-a.png'); 
            background-size: cover; background-position: center;
            z-index: 1; left: -5%; top: -5%;
            filter: blur(8px) brightness(0.6);
        }

        /* --- HEADER FULL WIDTH --- */
        .diary-header {
            background: white; padding: 15px 20px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 2px 15px rgba(0,0,0,0.2);
            position: fixed; top: 0; left: 0; width: 100%;
            z-index: 1000; box-sizing: border-box;
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .back-btn { color: var(--azul-bright); font-size: 1.2rem; cursor: pointer; border: none; background: none; text-decoration: none; }
        .diary-title h2 { margin: 0; font-size: 0.85rem; color: var(--azul-escuro); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .plus-btn { color: var(--azul-bright); font-size: 1.6rem; background: none; border: none; cursor: pointer; }

        /* --- TELA 1: BIBLIOTECA (3 COLUNAS) --- */
        #library-view {
            position: relative; z-index: 10;
            padding: 90px 10px 40px;
            height: 100vh; overflow-y: auto;
            box-sizing: border-box;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 POR LINHA */
            gap: 8px;
            max-width: 800px;
            margin: 0 auto;
        }

        .art-card {
            background: white; border-radius: 10px;
            overflow: hidden; position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            aspect-ratio: 1; transition: 0.3s;
            cursor: zoom-in;
        }

        .art-card img { width: 100%; height: 100%; object-fit: cover; }

        .art-date {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: rgba(0,0,0,0.5); color: white;
            font-size: 0.55rem; padding: 4px 0; text-align: center;
            font-weight: 600;
        }

        /* --- TELA 2: ATELIÊ --- */
        #drawing-view {
            display: none; position: relative; z-index: 20; height: 100vh; flex-direction: column;
        }

        .canvas-area { flex: 1; padding: 80px 10px 150px; display: flex; justify-content: center; align-items: center; }
        canvas { background: white; border-radius: 15px; touch-action: none; width: 100%; height: 100%; box-shadow: 0 0 30px rgba(0,0,0,0.5); }

        /* CORES E FERRAMENTAS */
        .recent-colors-container {
            position: fixed; right: 10px; top: 90px;
            display: flex; flex-direction: column; gap: 8px;
            background: rgba(255,255,255,0.2); backdrop-filter: blur(10px);
            padding: 8px; border-radius: 30px; z-index: 1100;
        }
        .color-dot { width: 28px; height: 28px; border-radius: 50%; border: 2px solid white; cursor: pointer; }

        .toolbar {
            background: white; padding: 15px; border-radius: 25px 25px 0 0;
            display: flex; flex-direction: column; gap: 12px;
            position: fixed; bottom: 0; left: 0; width: 100%;
            box-sizing: border-box; z-index: 1100; box-shadow: 0 -5px 25px rgba(0,0,0,0.3);
        }
        .brushes-row { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .tool-btn {
            background: #f1f3f5; border: none; min-width: 42px; height: 42px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; font-size: 1rem;
        }
        .tool-btn.active { background: var(--azul-bright); color: white; }

        /* --- EFEITO DE EXPANSÃO (MODAL) --- */
        #expand-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000;
            justify-content: center; align-items: center; flex-direction: column;
        }
        #expanded-img { max-width: 90%; max-height: 70%; border-radius: 15px; box-shadow: 0 0 30px var(--azul-bright); transform: scale(0.8); transition: 0.3s; }
        #expand-modal.active #expanded-img { transform: scale(1); }
        
        .modal-btns { margin-top: 20px; display: flex; gap: 20px; }
        .circle-action {
            width: 50px; height: 50px; border-radius: 50%; border: none;
            background: white; color: var(--azul-escuro); font-size: 1.2rem; cursor: pointer;
        }

        .empty-msg { color: white; grid-column: span 3; text-align: center; padding-top: 100px; opacity: 0.6; }
    </style>
</head>
<body>

    <div class="background-layer"></div>

    <!-- BIBLIOTECA -->
    <section id="library-view">
        <header class="diary-header">
            <div class="header-left">
                <a href="sala-de-jogos.html" class="back-btn"><i class="fas fa-chevron-left"></i></a>
                <div class="diary-title"><h2>Minha Galeria</h2></div>
            </div>
            <button class="plus-btn" onclick="openCanvas()"><i class="fa-solid fa-circle-plus"></i></button>
        </header>

        <div class="gallery-grid" id="galleryGrid"></div>
    </section>

    <!-- ATELIÊ -->
    <section id="drawing-view">
        <header class="diary-header">
            <div class="header-left">
                <button class="back-btn" onclick="closeCanvas()"><i class="fas fa-chevron-left"></i></button>
                <div class="diary-title"><h2>Novo Desenho</h2></div>
            </div>
            <button class="plus-btn" onclick="saveToLibrary()"><i class="fa-solid fa-circle-check"></i></button>
        </header>

        <div class="recent-colors-container" id="recentColors"></div>

        <div class="canvas-area">
            <canvas id="paintCanvas"></canvas>
        </div>

        <div class="toolbar">
            <div class="brushes-row">
                <button class="tool-btn active" onclick="setBrush('normal', this)"><i class="fa-solid fa-pencil"></i></button>
                <button class="tool-btn" onclick="setBrush('neon', this)"><i class="fa-solid fa-sun"></i></button>
                <button class="tool-btn" onclick="setBrush('spray', this)"><i class="fa-solid fa-spray-can"></i></button>
                <button class="tool-btn" onclick="setBrush('marker', this)"><i class="fa-solid fa-highlighter"></i></button>
                <button class="tool-btn" onclick="setBrush('eraser', this)"><i class="fa-solid fa-eraser"></i></button>
            </div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <input type="color" id="colorPicker" value="#32B5F1" onchange="addColorToHistory(this.value)" style="width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--azul-bright); background: none; cursor: pointer;">
                <input type="range" id="sizeSlider" min="2" max="60" value="10" style="flex: 1; accent-color: var(--azul-bright);">
                <button onclick="clearCanvas()" style="border: none; background: none; color: #e74c3c; font-size: 1.2rem;"><i class="fa-solid fa-trash-can"></i></button>
            </div>
        </div>
    </section>

    <!-- MODAL DE EXPANSÃO -->
    <div id="expand-modal" onclick="closeExpand()">
        <img id="expanded-img" src="" onclick="event.stopPropagation()">
        <div class="modal-btns">
            <button class="circle-action" onclick="downloadArt()"><i class="fa-solid fa-download"></i></button>
            <button class="circle-action" onclick="deleteCurrentArt()" style="color: #e74c3c;"><i class="fa-solid fa-trash"></i></button>
            <button class="circle-action" onclick="closeExpand()"><i class="fa-solid fa-xmark"></i></button>
        </div>
    </div>


    <script src="mindfine-sync.js"></script>
    <script>
        // Carregar dados ao entrar na página
window.addEventListener('load', async () => {
    const progresso = await window.mindfineAPI.inicializarPagina();
    
    if (progresso) {
        // Aplicar dados carregados
        currentCoins = progresso.moedas;
        currentXP = progresso.xp;
        currentLevel = progresso.nivel;
        
        // Atualizar UI
        document.getElementById('coin-count').innerText = currentCoins.toLocaleString('pt-BR');
        document.getElementById('level-display').innerText = `NV. ${currentLevel}`;
        document.getElementById('xp-bar-fill').style.width = currentXP + '%';
        
        // Aplicar skin
        document.getElementById('panda-image').src = progresso.skin_atual;
        
        // Carregar universos desbloqueados
        progresso.universos_desbloqueados.forEach(nome => {
            const universo = universes.find(u => u.name === nome);
            if (universo) universo.unlocked = true;
        });
        
        // Verificar se já registrou emoção hoje
        const jaRegistrou = await window.mindfineAPI.jaRegistrouEmocaoHoje();
        if (jaRegistrou) {
            document.getElementById('checkinModal').classList.add('hidden');
        } else {
            document.getElementById('checkinModal').classList.remove('hidden');
        }
    }
});
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const galleryGrid = document.getElementById('galleryGrid');
        let painting = false;
        let currentBrush = 'normal';
        let colorHistory = ['#32B5F1', '#000000', '#FF5252', '#4CAF50', '#FFEB3B', '#9C27B0', '#FF9800', '#FFFFFF'];
        let selectedArtIndex = -1;

        window.onload = () => { loadGallery(); renderRecentColors(); };

        function loadGallery() {
            const arts = JSON.parse(localStorage.getItem('mindfine_gallery') || '[]');
            galleryGrid.innerHTML = arts.length === 0 ? '<div class="empty-msg">Nenhum desenho ainda.</div>' : '';
            arts.forEach((art, index) => {
                const div = document.createElement('div');
                div.className = 'art-card';
                div.onclick = () => expandArt(index);
                div.innerHTML = `<img src="${art.data}"><div class="art-date">${art.date}</div>`;
                galleryGrid.appendChild(div);
            });
        }

        function renderRecentColors() {
            const box = document.getElementById('recentColors');
            box.innerHTML = '';
            colorHistory.forEach(color => {
                const dot = document.createElement('div');
                dot.className = 'color-dot';
                dot.style.background = color;
                dot.onclick = () => document.getElementById('colorPicker').value = color;
                box.appendChild(dot);
            });
        }

        function addColorToHistory(newColor) {
            colorHistory = [newColor, ...colorHistory.filter(c => c !== newColor)].slice(0, 8);
            renderRecentColors();
        }

        function openCanvas() {
            document.getElementById('library-view').style.display = 'none';
            document.getElementById('drawing-view').style.display = 'flex';
            resizeCanvas();
        }

        function closeCanvas() {
            if(confirm("Descartar?")) {
                document.getElementById('drawing-view').style.display = 'none';
                document.getElementById('library-view').style.display = 'block';
            }
        }

        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        }

        function saveToLibrary() {
            const arts = JSON.parse(localStorage.getItem('mindfine_gallery') || '[]');
            const newArt = {
                data: canvas.toDataURL(),
                date: new Date().toLocaleDateString('pt-BR')
            };
            arts.unshift(newArt);
            localStorage.setItem('mindfine_gallery', JSON.stringify(arts));
            location.reload();
        }

        // --- EXPANSÃO ---
        function expandArt(index) {
            const arts = JSON.parse(localStorage.getItem('mindfine_gallery') || '[]');
            selectedArtIndex = index;
            document.getElementById('expanded-img').src = arts[index].data;
            document.getElementById('expand-modal').style.display = 'flex';
            setTimeout(() => document.getElementById('expand-modal').classList.add('active'), 10);
        }

        function closeExpand() {
            document.getElementById('expand-modal').classList.remove('active');
            setTimeout(() => document.getElementById('expand-modal').style.display = 'none', 300);
        }

        function downloadArt() {
            const link = document.createElement('a');
            link.download = `mindfine-arte-${selectedArtIndex}.png`;
            link.href = document.getElementById('expanded-img').src;
            link.click();
        }

        function deleteCurrentArt() {
            if(confirm("Excluir desenho?")) {
                let arts = JSON.parse(localStorage.getItem('mindfine_gallery') || '[]');
                arts.splice(selectedArtIndex, 1);
                localStorage.setItem('mindfine_gallery', JSON.stringify(arts));
                location.reload();
            }
        }

        // --- CANVAS LOGIC ---
        function setBrush(type, btn) {
            currentBrush = type;
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function draw(e) {
            if (!painting) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;
            const size = document.getElementById('sizeSlider').value;
            const color = document.getElementById('colorPicker').value;

            ctx.lineWidth = size; ctx.strokeStyle = (currentBrush === 'eraser') ? 'white' : color;
            ctx.shadowBlur = (currentBrush === 'neon') ? size : 0;
            ctx.shadowColor = color;
            ctx.globalAlpha = (currentBrush === 'marker') ? 0.4 : 1;

            ctx.lineTo(x, y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x, y);
        }

        function clearCanvas() { if(confirm("Limpar?")) ctx.fillRect(0,0,canvas.width,canvas.height); }

        canvas.addEventListener('mousedown', (e) => { painting = true; draw(e); });
        canvas.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', () => { painting = false; ctx.beginPath(); });
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); painting = true; draw(e); });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });
        canvas.addEventListener('touchend', () => { painting = false; ctx.beginPath(); });
    </script>
</body>
</html>
