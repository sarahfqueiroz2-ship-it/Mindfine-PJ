<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mindfine - Caça-Palavras</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        :root {
            --azul-bright: #32B5F1;
            --azul-escuro: #0277bd;
            --azul-claro: #e1f5fe;
            --branco: #ffffff;
            --fundo-transparente: rgba(255, 255, 255, 0.98);
        }

        * {
            margin: 0; padding: 0;
            box-sizing: border-box;
        }

        body, html {
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 0;
        }

        /* Camada de fundo igual ao Jogo da Velha */
        .background-layer {
            position: fixed; width: 110%; height: 110%;
            background-image: url('fundos/fundo-a.png'); 
            background-size: cover; background-position: center;
            z-index: 1; left: -5%; top: -5%;
            filter: blur(8px) brightness(0.6);
        }

        /* Header padrão Mindfine */
        .diary-header {
            position: fixed; top: 0; left: 0; width: 100%;
            background: white; padding: 12px 25px;
            display: flex; align-items: center; gap: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            z-index: 500;
        }
        .header-left { display: flex; align-items: center; gap: 15px; flex-grow: 1; }
        .back-btn { color: var(--azul-bright); font-size: 1.4rem; text-decoration: none; }
        .diary-title h2 { margin: 0; font-size: 1rem; color: var(--azul-escuro); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        .container {
            position: relative;
            z-index: 10;
            background: var(--fundo-transparente);
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            text-align: center;
            width: 500px;
            max-width: 95vw;
            backdrop-filter: blur(10px);
            margin-top: 60px;
        }

        .screen { display: none; }
        .screen.active { display: block; }

        /* Placar estilo Bolhas */
        .scoreboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        .score-bubble {
            background: var(--azul-claro);
            padding: 8px;
            border-radius: 15px;
            border: 1px solid rgba(50, 181, 241, 0.2);
        }
        .score-label { font-size: 0.6rem; text-transform: uppercase; color: var(--azul-escuro); font-weight: 800; }
        .score-value { font-size: 1.1rem; color: var(--azul-escuro); font-weight: 800; }

        /* Estilo do Grid */
        .grid-container {
            background: #fff;
            padding: 10px;
            border-radius: 20px;
            border: 2px solid var(--azul-claro);
            margin-bottom: 15px;
            display: inline-block;
        }
        .grid {
            display: grid;
            gap: 4px;
            user-select: none;
        }
        .cell {
            width: 32px;
            height: 32px;
            background: #fff;
            border: 1px solid #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.9rem;
            font-weight: 800;
            color: var(--azul-escuro);
            cursor: pointer;
            border-radius: 6px;
            transition: 0.2s;
        }
        .cell.selected {
            background: var(--azul-bright);
            color: white;
            border-color: var(--azul-bright);
        }
        .cell.found {
            background: var(--azul-escuro);
            color: white;
            border-color: var(--azul-escuro);
        }

        /* Lista de Palavras */
        .words-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin: 15px 0;
        }
        .word-item {
            padding: 5px 12px;
            background: var(--azul-claro);
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--azul-escuro);
            text-transform: uppercase;
        }
        .word-item.found {
            background: #d1d1d1;
            color: #888;
            text-decoration: line-through;
        }

        /* Botões Estilizados */
        .btn-style {
            padding: 12px 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            border: 2px solid var(--azul-bright);
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            background: white;
            color: var(--azul-escuro);
            font-family: 'Montserrat', sans-serif;
            width: 100%;
            margin-bottom: 10px;
        }
        .btn-style:hover {
            background: var(--azul-bright);
            color: white;
        }
        .btn-filled {
            background: var(--azul-bright);
            color: white;
        }

        .message-box {
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--azul-escuro);
            text-transform: uppercase;
            min-height: 30px;
            margin-bottom: 10px;
        }

        /* Confete */
        #confettiContainer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1000;
        }

        @media (max-width: 450px) {
            .cell { width: 25px; height: 25px; font-size: 0.7rem; }
            .container { padding: 15px; }
        }
    </style>
</head>
<body>

    <div class="background-layer"></div>

    <header class="diary-header">
        <div class="header-left">
            <a href="sala-de-jogos.html" class="back-btn"><i class="fas fa-chevron-left"></i></a>
            <div class="diary-title">
                <h2>Caça-Palavras</h2>
            </div>
        </div>
        <i class="fas fa-search" style="color: var(--azul-bright); font-size: 1.2rem;"></i>
    </header>

    <div class="container">
        <div id="confettiContainer"></div>
       
        <!-- TELA 1: MENU -->
        <div class="screen active" id="menuScreen">
            <div class="message-box">Escolha o nível de dificuldade</div>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <button class="btn-style" onclick="startGame('easy')">Iniciante (8x8)</button>
                <button class="btn-style" onclick="startGame('medium')">Intermediário (10x10)</button>
                <button class="btn-style" onclick="startGame('hard')">Mestre (12x12)</button>
            </div>
        </div>

        <!-- TELA 2: JOGO -->
        <div class="screen" id="gameScreen">
            <div class="scoreboard">
                <div class="score-bubble">
                    <div class="score-label">Tema</div>
                    <div class="score-value" id="themeDisplay">...</div>
                </div>
                <div class="score-bubble">
                    <div class="score-label">Pontos</div>
                    <div class="score-value" id="scoreDisplay">0</div>
                </div>
            </div>

            <div class="grid-container">
                <div class="grid" id="grid"></div>
            </div>

            <div class="words-list" id="wordsList"></div>
            <div class="message-box" id="messageBox">Encontre as palavras!</div>

            <div style="display: flex; gap: 10px;">
                <button class="btn-style" onclick="location.reload()">Sair</button>
                <button class="btn-style btn-filled" onclick="newGame()">Reiniciar</button>
            </div>
        </div>
    </div>

    <script src="mindfine-sync.js"></script>
    <script>
        // Carregar dados ao entrar na página
window.addEventListener('load', async () => {
    const progresso = await window.mindfineAPI.inicializarPagina();
    
    if (progresso) {
        // Aplicar dados carregados
        currentCoins = progresso.moedas;
        currentXP = progresso.xp;
        currentLevel = progresso.nivel;
        
        // Atualizar UI
        document.getElementById('coin-count').innerText = currentCoins.toLocaleString('pt-BR');
        document.getElementById('level-display').innerText = `NV. ${currentLevel}`;
        document.getElementById('xp-bar-fill').style.width = currentXP + '%';
        
        // Aplicar skin
        document.getElementById('panda-image').src = progresso.skin_atual;
        
        // Carregar universos desbloqueados
        progresso.universos_desbloqueados.forEach(nome => {
            const universo = universes.find(u => u.name === nome);
            if (universo) universo.unlocked = true;
        });
        
        // Verificar se já registrou emoção hoje
        const jaRegistrou = await window.mindfineAPI.jaRegistrouEmocaoHoje();
        if (jaRegistrou) {
            document.getElementById('checkinModal').classList.add('hidden');
        } else {
            document.getElementById('checkinModal').classList.remove('hidden');
        }
    }
});

        const gridElement = document.getElementById('grid');
        const wordsListElement = document.getElementById('wordsList');
        const themeDisplay = document.getElementById('themeDisplay');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const messageBox = document.getElementById('messageBox');
        const menuScreen = document.getElementById('menuScreen');
        const gameScreen = document.getElementById('gameScreen');

        let difficulty = 'medium';
        let gridSize = 10;
        let grid = [];
        let words = [];
        let foundWords = [];
        let selectedCells = [];
        let isSelecting = false;
        let score = 0;

        const themes = {
            easy: [
                { name: 'Cores', words: ['AZUL', 'VERDE', 'ROSA', 'ROXO', 'AMARELO'] },
                { name: 'Frutas', words: ['MACA', 'UVA', 'PERA', 'MANGA', 'LIMAO'] },
                { name: 'Calma', words: ['PAZ', 'ZEN', 'FOCO', 'RISO', 'SONO'] }
            ],
            medium: [
                { name: 'Natureza', words: ['FLORESTA', 'OCEANO', 'MONTANHA', 'NUVEM', 'SOLAR', 'ARVORE'] },
                { name: 'Sentimentos', words: ['ALEGRIA', 'CALMA', 'AMOR', 'GRATIDAO', 'ESPERANCA'] },
                { name: 'Habilidades', words: ['LEITURA', 'MUSICA', 'PINTURA', 'DANCA', 'POESIA'] },
                { name: 'Clima', words: ['CHUVA', 'VENTO', 'TROVAO', 'CALOR', 'FRESCO'] }
            ],
            hard: [
                { name: 'Mindfulness', words: ['MINDFULNESS', 'PRESENCA', 'RESPIRAR', 'ATENCAO', 'SILENCIO', 'EQUILIBRIO'] },
                { name: 'Psicologia', words: ['EMPATIA', 'RESILIENCIA', 'TERAPIA', 'COGNICAO', 'EVOLUCAO', 'PSIQUICO'] },
                { name: 'Bem-Estar', words: ['MEDITACAO', 'AUTOESTIMA', 'SAUDE', 'HARMONIA', 'VITALIDADE', 'SERENIDADE'] }
            ]
        };

        function startGame(level) {
            difficulty = level;
            gridSize = level === 'easy' ? 8 : (level === 'medium' ? 10 : 12);
            menuScreen.classList.remove('active');
            gameScreen.classList.add('active');
            newGame();
        }

        function newGame() {
            score = 0;
            foundWords = [];
            selectedCells = [];
            updateScore();
            
            const themeList = themes[difficulty];
            const selectedTheme = themeList[Math.floor(Math.random() * themeList.length)];
            themeDisplay.textContent = selectedTheme.name;
            words = selectedTheme.words;

            createGrid();
            placeWords();
            fillEmpty();
            render();
        }

        function createGrid() {
            grid = Array(gridSize).fill().map(() => Array(gridSize).fill({ letter: '', found: false }));
        }

        function placeWords() {
            words.forEach(word => {
                let placed = false;
                while (!placed) {
                    const isHoriz = Math.random() > 0.5;
                    const row = Math.floor(Math.random() * (isHoriz ? gridSize : gridSize - word.length));
                    const col = Math.floor(Math.random() * (isHoriz ? gridSize - word.length : gridSize));
                    
                    let canPlace = true;
                    for (let i = 0; i < word.length; i++) {
                        const r = isHoriz ? row : row + i;
                        const c = isHoriz ? col + i : col;
                        if (grid[r][c].letter !== '' && grid[r][c].letter !== word[i]) {
                            canPlace = false; break;
                        }
                    }

                    if (canPlace) {
                        for (let i = 0; i < word.length; i++) {
                            const r = isHoriz ? row : row + i;
                            const c = isHoriz ? col + i : col;
                            grid[r][c] = { letter: word[i], found: false };
                        }
                        placed = true;
                    }
                }
            });
        }

        function fillEmpty() {
            const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    if (grid[r][c].letter === '') {
                        grid[r][c] = { letter: letters[Math.floor(Math.random() * 26)], found: false };
                    }
                }
            }
        }

        function render() {
            gridElement.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
            gridElement.innerHTML = '';
            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell' + (grid[r][c].found ? ' found' : '');
                    cell.textContent = grid[r][c].letter;
                    cell.onmousedown = () => startSelect(r, c);
                    cell.onmouseenter = () => moveSelect(r, c);
                    cell.onmouseup = endSelect;
                    gridElement.appendChild(cell);
                }
            }

            wordsListElement.innerHTML = '';
            words.forEach(w => {
                const span = document.createElement('span');
                span.className = 'word-item' + (foundWords.includes(w) ? ' found' : '');
                span.textContent = w;
                wordsListElement.appendChild(span);
            });
        }

        function startSelect(r, c) { isSelecting = true; selectedCells = [{r, c}]; updateSelection(); }
        function moveSelect(r, c) {
            if (!isSelecting) return;
            if (!selectedCells.some(cell => cell.r === r && cell.c === c)) {
                selectedCells.push({r, c});
                updateSelection();
            }
        }

        function endSelect() {
            if (!isSelecting) return;
            isSelecting = false;
            const selectedWord = selectedCells.map(cell => grid[cell.r][cell.c].letter).join('');
            const reversedWord = selectedWord.split('').reverse().join('');

            if (words.includes(selectedWord) && !foundWords.includes(selectedWord)) {
                markFound(selectedWord);
            } else if (words.includes(reversedWord) && !foundWords.includes(reversedWord)) {
                markFound(reversedWord);
            }

            selectedCells = [];
            render();
        }

        function updateSelection() {
            const allCells = document.querySelectorAll('.cell');
            allCells.forEach(cell => cell.classList.remove('selected'));
            selectedCells.forEach(cell => {
                allCells[cell.r * gridSize + cell.c].classList.add('selected');
            });
        }

        function markFound(word) {
            foundWords.push(word);
            selectedCells.forEach(cell => grid[cell.r][cell.c].found = true);
            score += 10;
            updateScore();
            if (foundWords.length === words.length) {
                messageBox.textContent = "Incrível! Você achou tudo!";
                createBlueConfetti();
            }
        }

        function updateScore() { scoreDisplay.textContent = score; }

        function createBlueConfetti() {
            const container = document.getElementById('confettiContainer');
            const colors = ['#32B5F1', '#0277bd', '#b3e5fc', '#ffffff'];
            for (let i = 0; i < 50; i++) {
                const c = document.createElement('div');
                c.style.position = 'absolute';
                c.style.width = '8px'; c.style.height = '8px';
                c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                c.style.left = Math.random() * 100 + '%';
                c.style.top = '-10px';
                c.style.borderRadius = '50%';
                container.appendChild(c);
                c.animate([
                    { transform: 'translateY(0) rotate(0)', opacity: 1 },
                    { transform: `translateY(${window.innerHeight}px) rotate(360deg)`, opacity: 0 }
                ], { duration: 2000 + Math.random() * 1000, easing: 'ease-out' }).onfinish = () => c.remove();
            }
        }

        document.addEventListener('mouseup', () => isSelecting = false);
    </script>
</body>
</html>
