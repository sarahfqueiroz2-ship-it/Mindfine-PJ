<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mindfine - Playlist</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        :root {
            --azul-bright: #32B5F1;
            --azul-mind: #33BEF4;
            --azul-escuro: #0277bd;
            --cor-coracao: #ff4757;
            --branco: #ffffff;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; 
            overflow: hidden; 
            font-family: 'Montserrat', sans-serif;
            background: #000;
        }

        /* ESTILO VISUAL DA PÁGINA DE JOGOS */
        .background-layer {
            position: fixed; width: 110%; height: 110%;
            background-image: url('fundos/fundo-a.png'); 
            background-size: cover; background-position: center;
            z-index: 1; left: -5%; top: -5%;
            filter: blur(8px) brightness(0.6);
        }

        #particles-container { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; z-index: 2; 
        }
        
        .bubble { 
            position: absolute; bottom: -20px; background: rgba(255,255,255,0.2); 
            border-radius: 50%; animation: rise linear forwards; 
        }
        @keyframes rise { to { transform: translateY(-110vh); opacity: 0; } }

        .main-content {
            position: relative; 
            z-index: 10;
            height: 100vh; 
            display: flex; 
            flex-direction: column;
        }

        /* HEADER ESTILO JOGOS + BOTÕES PLAYLIST */
        .diary-header {
            background: white; 
            padding: 10px 20px;
            display: flex; 
            justify-content: space-between;
            align-items: center; 
            box-shadow: 0 2px 15px rgba(0,0,0,0.2);
            z-index: 500;
        }
        
        .header-left { display: flex; align-items: center; gap: 12px; }
        .header-right { display: flex; gap: 15px; }
        
        .back-btn { color: var(--azul-bright); font-size: 1.2rem; cursor: pointer; border: none; background: none; }
        .diary-title h2 { margin: 0; font-size: 1rem; color: var(--azul-escuro); font-weight: 800; text-transform: uppercase; }

        .btn-header-action {
            background: var(--azul-bright); color: white;
            border: none; width: 35px; height: 35px;
            border-radius: 50%; font-size: 1rem;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
        }

        /* ABAS (TABS) */
        .tabs-container { 
            display: flex; 
            justify-content: center; 
            gap: 8px;
            padding: 15px 10px;
            overflow-x: auto;
            white-space: nowrap;
        }
        .tab-btn {
            background: rgba(255, 255, 255, 0.2); 
            border: 1px solid rgba(255, 255, 255, 0.4); 
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.7rem; font-weight: 600; color: white;
            cursor: pointer; transition: 0.3s; text-transform: uppercase;
            backdrop-filter: blur(5px);
        }
        .tab-btn.active { 
            background: white; 
            color: var(--azul-bright); 
            border-color: white;
        }

        /* ÁREA DA LISTA DE MÚSICAS (ESTILO GRID JOGOS) */
        .content-section { 
            display: none; 
            flex-grow: 1;
            overflow-y: auto;
            padding: 0 20px 100px; /* Espaço para o navbar */
        }
        .content-section.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } }

        .music-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* CARDS ESTILO JOGOS */
        .music-card {
            background: white; 
            border-radius: 18px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.15);
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
            transition: 0.3s ease;
            position: relative;
        }
        .music-card:hover { transform: translateY(-3px); }
        
        .card-img-container {
            width: 100%; height: 90px;
            background: #f0f0f0; overflow: hidden;
            position: relative;
        }
        .card-img { width: 100%; height: 100%; object-fit: cover; }
        
        .play-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center;
            color: white; font-size: 1.5rem; opacity: 0; transition: 0.3s;
        }
        .music-card:hover .play-overlay { opacity: 1; }

        .card-info { padding: 10px; text-align: center; position: relative; }
        .card-info strong { display: block; font-size: 0.8rem; color: var(--azul-escuro); text-transform: uppercase; margin-bottom: 2px; }
        .card-info p { font-size: 0.6rem; color: #666; margin: 0; }

        .btn-like {
            position: absolute; top: -15px; right: 10px;
            background: white; border: none; width: 30px; height: 30px;
            border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            color: #ccc; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-like.active { color: var(--cor-coracao); }

        /* PLAYER MODAL (ESTILO JOGOS) */
        #player-area {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(15px);
            z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .player-card {
            background: white; width: 85%; max-width: 350px;
            padding: 30px 20px; border-radius: 30px; text-align: center;
            position: relative;
        }
        .disk-container {
            width: 150px; height: 150px; margin: 0 auto 20px;
            border-radius: 50%; border: 5px solid var(--azul-bright);
            overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .disk-img { width: 100%; height: 100%; object-fit: cover; }
        .rotating { animation: spin 8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .player-controls { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 20px; }
        .btn-ctrl { background: none; border: none; font-size: 1.5rem; color: var(--azul-bright); cursor: pointer; }
        .btn-play { font-size: 3rem; }

        /* NAVBAR */
        .nav-pill {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: white; padding: 10px 25px; border-radius: 100px;
            display: flex; gap: 20px; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 2000;
        }
        .nav-item { 
            text-decoration: none; color: #b3e5fc; 
            font-weight: 800; font-size: 0.6rem; text-transform: uppercase; 
            display: flex; flex-direction: column; align-items: center; gap: 4px;
        }
        .nav-item.active { color: var(--azul-bright); }

        .empty-msg { text-align: center; color: white; padding: 40px; font-size: 0.9rem; }
        
        @media (min-width: 500px) {
            .music-grid { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>

    <div class="background-layer"></div>
    <div id="particles-container"></div>

    <div class="main-content">
        <header class="diary-header">
            <div class="header-left">
                <a href="inicial.html" class="back-btn"><i class="fas fa-chevron-left"></i></a>
                <div class="diary-title"><h2>Minhas Playlists</h2></div>
            </div>
            <div class="header-right">
                <button class="btn-header-action" onclick="playSurprise()"><i class="fa-solid fa-shuffle"></i></button>
                <button class="btn-header-action" onclick="togglePlayer()"><i class="fa-solid fa-compact-disc"></i></button>
            </div>
        </header>

        <div class="tabs-container">
            <button class="tab-btn active" onclick="switchTab('natureza', this)">Natureza</button>
            <button class="tab-btn" onclick="switchTab('lofi', this)">Lo-Fi</button>
            <button class="tab-btn" onclick="switchTab('foco', this)">Foco</button>
            <button class="tab-btn" onclick="switchTab('favoritas', this)"><i class="fa-solid fa-heart"></i> Favoritos</button>
        </div>

        <div id="natureza" class="content-section active">
            <div class="music-grid" id="lista-natureza"></div>
        </div>
        <div id="lofi" class="content-section">
            <div class="music-grid" id="lista-lofi"></div>
        </div>
        <div id="foco" class="content-section">
            <div class="music-grid" id="lista-foco"></div>
        </div>
        <div id="favoritas" class="content-section">
            <div class="music-grid" id="lista-favoritas"></div>
        </div>
    </div>

    <!-- PLAYER MODAL -->
    <div id="player-area">
        <div class="player-card">
            <button onclick="togglePlayer()" style="position:absolute; top:15px; right:15px; border:none; background:none; font-size:1.5rem; color:#ccc; cursor:pointer;">&times;</button>
            <div class="disk-container" id="disk">
                <img src="" class="disk-img" id="player-img">
            </div>
            <h2 id="player-title" style="margin:0; font-size:1rem; color: var(--azul-escuro);">Selecione uma música</h2>
            <p id="player-artist" style="color:var(--azul-bright); font-size:0.7rem; font-weight:800; margin:5px 0 20px;">MINDFINE</p>
            <div class="player-controls">
                <button class="btn-ctrl" onclick="prevTrack()"><i class="fa-solid fa-backward-step"></i></button>
                <button class="btn-ctrl btn-play" onclick="togglePlayPause()"><i class="fa-solid fa-circle-play" id="play-icon"></i></button>
                <button class="btn-ctrl" onclick="nextTrack()"><i class="fa-solid fa-forward-step"></i></button>
            </div>
            <audio id="main-audio" src=""></audio>
        </div>
    </div>

    <!-- NAVBAR -->
    <nav class="nav-pill">
        <a href="inicial.html" class="nav-item active"><i class="fas fa-home"></i><span>Início</span></a>
        <a href="diario.html" class="nav-item active"><i class="fas fa-book"></i><span>Diário</span></a>
        <a href="chat-com-psicologa.html" class="nav-item active"><i class="fas fa-comments"></i><span>Apoio</span></a>
        <a href="pagina-de-respiracao.html" class="nav-item active"><i class="fas fa-wind"></i><span>Respiração</span></a>
        <a href="playlist.html" class="nav-item active"><i class="fas fa-music"></i><span>Playlist</span></a>
    </nav>

    <script>
        const musicas = [
            { id: 0, title: "Chuva Suave", cat: "natureza", img: "fundos/chuva-caindo.jpeg", src: "sons/chuva.mp3" },
            { id: 1, title: "Chuva Musical", cat: "natureza", img: "fundos/chuva-caindo.jpeg", src: "sons/chuva-meditação.mp3" },
            { id: 2, title: "Canto do pássaros", cat: "natureza", img: "fundos/chuva-caindo.jpeg", src: "sons/passaro-calmo.mp3" },
            { id: 3, title: "Vento suave", cat: "natureza", img: "fundos/chuva-caindo.jpeg", src: "sons/vento.mp3" },
            { id: 4, title: "Noite de Estudo", cat: "lofi", img: "fundos/chuva-caindo.jpeg", src: "sons/mar-agitado.mp3" },
            { id: 5, title: "Vibe Relax", cat: "lofi", img: "fundos/chuva-caindo.jpeg", src: "sons/lo-fi-cafeteria.mp3" },
            { id: 6, title: "Foco Total 01", cat: "foco", img: "fundos/chuva-caindo.jpeg", src: "sons/chuva.mp3" }
        ];

        let favoritos = JSON.parse(localStorage.getItem('mindfine_favs')) || [];
        let currentTrackIndex = 0;
        const audio = document.getElementById('main-audio');
        const playIcon = document.getElementById('play-icon');
        const disk = document.getElementById('disk');

        function renderPlaylists() {
            ['natureza', 'lofi', 'foco'].forEach(cat => {
                const el = document.getElementById(`lista-${cat}`);
                if(el) {
                    const filtered = musicas.filter(m => m.cat === cat);
                    el.innerHTML = filtered.map(m => createCard(m)).join('');
                }
            });
            renderFavorites();
        }

        function createCard(m) {
            const isFav = favoritos.includes(m.id);
            return `
                <div class="music-card" onclick="playTrack(${m.id})">
                    <div class="card-img-container">
                        <img src="${m.img}" class="card-img">
                        <div class="play-overlay"><i class="fa-solid fa-play"></i></div>
                    </div>
                    <div class="card-info">
                        <button class="btn-like ${isFav ? 'active' : ''}" onclick="toggleFavorite(event, ${m.id})">
                            <i class="fa-${isFav ? 'solid' : 'regular'} fa-heart"></i>
                        </button>
                        <strong>${m.title}</strong>
                        <p>${m.cat.toUpperCase()}</p>
                    </div>
                </div>`;
        }

        function toggleFavorite(event, id) {
            event.stopPropagation();
            const index = favoritos.indexOf(id);
            if (index > -1) { favoritos.splice(index, 1); } 
            else { favoritos.push(id); }
            localStorage.setItem('mindfine_favs', JSON.stringify(favoritos));
            renderPlaylists();
        }

        function renderFavorites() {
            const container = document.getElementById('lista-favoritas');
            const musicasFavoritas = musicas.filter(m => favoritos.includes(m.id));
            if (musicasFavoritas.length === 0) {
                container.innerHTML = '<p class="empty-msg">Nenhuma música favorita ainda.</p>';
                return;
            }
            container.innerHTML = musicasFavoritas.map(m => createCard(m)).join('');
        }

        function switchTab(tabId, btn) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }

        function togglePlayer() {
            const player = document.getElementById('player-area');
            player.style.display = (player.style.display === 'flex') ? 'none' : 'flex';
        }

        function playTrack(id) {
            const track = musicas.find(m => m.id === id);
            currentTrackIndex = musicas.indexOf(track);
            audio.src = track.src;
            document.getElementById('player-title').innerText = track.title;
            document.getElementById('player-artist').innerText = track.cat.toUpperCase();
            document.getElementById('player-img').src = track.img;
            document.getElementById('player-area').style.display = 'flex';
            audio.play();
        }

        function togglePlayPause() {
            if (audio.paused) audio.play(); else audio.pause();
        }

        function updateUI() {
            if (audio.paused) {
                playIcon.className = "fa-solid fa-circle-play";
                disk.classList.remove('rotating');
            } else {
                playIcon.className = "fa-solid fa-circle-pause";
                disk.classList.add('rotating');
            }
        }

        function nextTrack() {
            currentTrackIndex = (currentTrackIndex + 1) % musicas.length;
            playTrack(musicas[currentTrackIndex].id);
        }

        function prevTrack() {
            currentTrackIndex = (currentTrackIndex - 1 + musicas.length) % musicas.length;
            playTrack(musicas[currentTrackIndex].id);
        }

        function playSurprise() {
            const randomIndex = Math.floor(Math.random() * musicas.length);
            playTrack(musicas[randomIndex].id);
        }

        // Bolhas/Partículas
        function createBubble() {
            const container = document.getElementById('particles-container');
            const b = document.createElement('div');
            b.className = 'bubble';
            const size = Math.random() * 20 + 5;
            b.style.width = size + 'px'; b.style.height = size + 'px';
            b.style.left = Math.random() * 100 + '%';
            b.style.animationDuration = (Math.random() * 5 + 8) + 's';
            container.appendChild(b);
            setTimeout(() => b.remove(), 10000);
        }

        setInterval(createBubble, 1500);
        audio.onplay = updateUI;
        audio.onpause = updateUI;
        audio.onended = nextTrack;
        renderPlaylists();
    </script>
</body>
</html>
