<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <title>Mindfine - Memória</title>

    <style>
        :root {
            --azul-bright: #32B5F1;
            --azul-escuro: #0277bd;
        }

        body, html {
            margin: 0; padding: 0;
            min-height: 100vh; 
            font-family: 'Montserrat', sans-serif;
            background: #000;
            overflow-x: hidden;
            user-select: none;
        }

        /* --- FUNDO PADRÃO --- */
        .background-layer {
            position: fixed;
            width: 110%; height: 110%;
            background-image: url('fundos/fundo-a.png');
            background-size: cover; background-position: center;
            z-index: 1; filter: blur(8px) brightness(0.6);
            left: -5%; top: -5%;
        }

        #particles-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 2; overflow: hidden;
        }

        .bubble { 
            position: absolute; bottom: -20px; 
            background: rgba(255,255,255,0.2); 
            border-radius: 50%; animation: rise linear forwards; 
        }
        @keyframes rise { to { transform: translateY(-110vh); opacity: 0; } }

        /* --- HEADER PADRONIZADO --- */
        .diary-header {
            background: white; padding: 15px 20px;
            display: flex; align-items: center; gap: 15px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
            position: fixed; top: 0; width: 100%;
            z-index: 500; box-sizing: border-box;
        }
        .header-left { display: flex; align-items: center; gap: 15px; flex-grow: 1; }
        .back-btn { color: var(--azul-bright); font-size: 1.2rem; cursor: pointer; border: none; background: none; text-decoration: none; }
        .diary-title h2 { margin: 0; font-size: 1rem; color: var(--azul-escuro); font-weight: 800; text-transform: uppercase; }

        /* --- LAYOUT DO JOGO --- */
        .main-content {
            position: relative; z-index: 10;
            padding-top: 80px; padding-bottom: 40px;
            display: flex; flex-direction: column; align-items: center;
        }

        .game-board-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px; padding: 20px;
            width: 95%; max-width: 1000px; /* Aumentado para o grid espalhar mais */
            margin-top: 10px;
        }

        .menu-screen { text-align: center; display: flex; flex-direction: column; gap: 15px; padding: 20px; }
        .menu-screen h3 { color: white; text-transform: uppercase; font-size: 1.2rem; margin-bottom: 10px; }
        
        .difficulty-btn {
            background: white; color: var(--azul-escuro);
            border: none; padding: 18px; border-radius: 15px;
            font-size: 0.9rem; font-weight: 800; cursor: pointer; 
            text-transform: uppercase; transition: 0.3s;
            border-left: 5px solid var(--azul-bright);
        }
        .difficulty-btn:hover { transform: scale(1.02); background: var(--azul-bright); color: white; }

        .game-screen { display: none; flex-direction: column; align-items: center; }

        .stats-bar {
            display: flex; justify-content: space-between; width: 100%;
            margin-bottom: 20px; font-weight: 800; color: white;
            background: rgba(0,0,0,0.3); padding: 12px 20px; border-radius: 50px;
            box-sizing: border-box; font-size: 0.8rem; text-transform: uppercase;
        }

        /* --- GRID ESPALHADO --- */
        .memory-grid { 
            display: grid; 
            gap: 10px; 
            width: 100%; 
            perspective: 1000px; 
            justify-content: center;
        }
        .grid-10 { grid-template-columns: repeat(5, 1fr); max-width: 600px; }
        .grid-20 { grid-template-columns: repeat(5, 1fr); max-width: 800px; }
        .grid-30 { grid-template-columns: repeat(6, 1fr); max-width: 950px; }

        /* --- CARTAS --- */
        .card {
            aspect-ratio: 3/4; cursor: pointer; position: relative;
            transform-style: preserve-3d; transition: transform 0.4s;
        }
        .card.flip { transform: rotateY(180deg); }
        .card.matched { opacity: 0.4; pointer-events: none; }

        .front, .back {
            width: 100%; height: 100%; position: absolute;
            border-radius: 12px; display: flex; align-items: center;
            justify-content: center; backface-visibility: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .front { background: var(--azul-bright); color: white; font-size: 1.5rem; border: 2px solid white; }
        .back { background: white; transform: rotateY(180deg); border: 2px solid var(--azul-bright); }
        .back i { color: var(--azul-escuro); font-size: 1.8rem; }

        /* --- ANIMAÇÕES DE VITÓRIA --- */
        #confetti-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1500; overflow: hidden;
        }
        .confetti {
            position: absolute; width: 10px; height: 10px; top: -10px;
            animation: confettiFall linear forwards;
        }
        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        .blue-explosion {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 0; height: 0; border-radius: 50%; z-index: 1400; pointer-events: none;
            background: radial-gradient(circle, rgba(50, 181, 241, 0.8) 0%, rgba(50, 181, 241, 0) 70%);
            animation: blueExplosion 0.8s ease-out forwards;
        }
        @keyframes blueExplosion {
            0% { width: 0; height: 0; opacity: 1; }
            100% { width: 1500px; height: 1500px; opacity: 0; }
        }

        .victory-modal {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); background: white;
            padding: 35px; border-radius: 25px; z-index: 2000;
            text-align: center; box-shadow: 0 0 50px rgba(0,0,0,0.5);
            width: 80%; max-width: 320px;
            animation: modalPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes modalPop { from { opacity: 0; transform: translate(-50%, -50%) scale(0.5); } }

        @media (max-width: 600px) {
            .grid-30 { grid-template-columns: repeat(5, 1fr); }
            .back i, .front { font-size: 1.1rem; }
        }
    </style>
</head>

<body>

    <div class="background-layer"></div>
    <div id="particles-container"></div>
    <div id="confetti-container"></div>

    <div class="main-content">
        <header class="diary-header">
            <div class="header-left">
                <button class="back-btn" onclick="handleBackButton()"><i class="fas fa-chevron-left"></i></button>
                <div class="diary-title">
                    <h2>Memória Afiada</h2>
                </div>
            </div>
            <i class="fas fa-brain" style="color: var(--azul-bright); font-size: 1.2rem;"></i>
        </header>

        <div class="game-board-container">
            <div id="menu-screen" class="menu-screen">
                <h3>Escolha o Nível</h3>
                <button class="difficulty-btn" onclick="startGame(10)">Leve • 10 Cartas</button>
                <button class="difficulty-btn" onclick="startGame(20)">Foco • 20 Cartas</button>
                <button class="difficulty-btn" onclick="startGame(30)">Mestre • 30 Cartas</button>
            </div>

            <div id="game-screen" class="game-screen">
                <div class="stats-bar">
                    <span>Movimentos: <span id="moves">0</span></span>
                    <span style="color: var(--azul-bright); cursor: pointer" onclick="confirmReset()">Reiniciar</span>
                </div>
                <div id="grid" class="memory-grid"></div>
            </div>
        </div>
    </div>

    <!-- MODAL VITÓRIA -->
    <div id="victory-modal" class="victory-modal">
        <i class="fa-solid fa-trophy" style="font-size: 60px; color: #FFD700; margin-bottom: 15px;"></i>
        <h2 style="color: var(--azul-escuro); margin: 0;">Excelente!</h2>
        <p style="color: #666; font-size: 0.9rem; margin: 10px 0 20px;">Sua mente está brilhando.</p>
        <button class="difficulty-btn" onclick="resetToMenu()">Jogar de Novo</button>
    </div>

    <script src="mindfine-sync.js"></script>
<script>
    // Carregar dados ao entrar na página
window.addEventListener('load', async () => {
    const progresso = await window.mindfineAPI.inicializarPagina();
    
    if (progresso) {
        // Aplicar dados carregados
        currentCoins = progresso.moedas;
        currentXP = progresso.xp;
        currentLevel = progresso.nivel;
        
        // Atualizar UI
        document.getElementById('coin-count').innerText = currentCoins.toLocaleString('pt-BR');
        document.getElementById('level-display').innerText = `NV. ${currentLevel}`;
        document.getElementById('xp-bar-fill').style.width = currentXP + '%';
        
        // Aplicar skin
        document.getElementById('panda-image').src = progresso.skin_atual;
        
        // Carregar universos desbloqueados
        progresso.universos_desbloqueados.forEach(nome => {
            const universo = universes.find(u => u.name === nome);
            if (universo) universo.unlocked = true;
        });
        
        // Verificar se já registrou emoção hoje
        const jaRegistrou = await window.mindfineAPI.jaRegistrouEmocaoHoje();
        if (jaRegistrou) {
            document.getElementById('checkinModal').classList.add('hidden');
        } else {
            document.getElementById('checkinModal').classList.remove('hidden');
        }
    }
});
    let isPlaying = false;
    let firstCard, secondCard;
    let lockBoard = false;
    let moves = 0;
    let matchedPairs = 0;
    let totalPairs = 0;

    const iconClasses = ['fa-leaf', 'fa-sun', 'fa-moon', 'fa-star', 'fa-cloud', 'fa-water', 'fa-seedling', 'fa-wind', 'fa-mountain', 'fa-tree', 'fa-feather', 'fa-dove', 'fa-heart', 'fa-anchor', 'fa-gem'];

    function createBubble() {
        const container = document.getElementById('particles-container');
        const b = document.createElement('div');
        b.className = 'bubble';
        const size = Math.random() * 20 + 5;
        b.style.width = size + 'px'; b.style.height = size + 'px';
        b.style.left = Math.random() * 100 + '%';
        b.style.animationDuration = (Math.random() * 5 + 8) + 's';
        container.appendChild(b);
        setTimeout(() => b.remove(), 10000);
    }
    setInterval(createBubble, 1500);

    function showVictoryAnimation() {
        // Explosão Azul
        const explosion = document.createElement('div');
        explosion.className = 'blue-explosion';
        document.body.appendChild(explosion);
        setTimeout(() => explosion.remove(), 1000);

        // Confetes
        const container = document.getElementById('confetti-container');
        const colors = ['#32B5F1', '#0277bd', '#FFD700', '#FFFFFF', '#4caf50'];
        for (let i = 0; i < 100; i++) {
            setTimeout(() => {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 100 + '%';
                c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                c.style.animationDuration = (Math.random() * 2 + 2) + 's';
                if (Math.random() > 0.5) c.style.borderRadius = '50%';
                container.appendChild(c);
                setTimeout(() => c.remove(), 4000);
            }, i * 20);
        }

        setTimeout(() => {
            document.getElementById('victory-modal').style.display = 'block';
        }, 600);
    }

    function handleBackButton() {
        if (isPlaying) {
            if (confirm("Deseja sair da partida?")) resetToMenu();
        } else {
            window.location.href = 'sala-de-jogos.html'; 
        }
    }

    function resetToMenu() {
        isPlaying = false;
        document.getElementById('game-screen').style.display = 'none';
        document.getElementById('menu-screen').style.display = 'flex';
        document.getElementById('victory-modal').style.display = 'none';
        document.getElementById('grid').innerHTML = '';
        document.getElementById('confetti-container').innerHTML = '';
    }

    function confirmReset() {
        const currentAmount = document.querySelectorAll('.card').length;
        startGame(currentAmount);
    }

    function startGame(amount) {
        isPlaying = true;
        totalPairs = amount / 2;
        moves = 0; matchedPairs = 0;
        document.getElementById('moves').innerText = moves;
        const grid = document.getElementById('grid');
        grid.className = `memory-grid grid-${amount}`;
        grid.innerHTML = '';

        const selectedIcons = iconClasses.slice(0, totalPairs);
        const gameIcons = [...selectedIcons, ...selectedIcons].sort(() => Math.random() - 0.5);

        gameIcons.forEach(iconName => {
            const card = document.createElement('div');
            card.classList.add('card');
            card.innerHTML = `
                <div class="front"><i class="fa-solid fa-question"></i></div>
                <div class="back"><i class="fa-solid ${iconName}"></i></div>
            `;
            card.dataset.icon = iconName;
            card.addEventListener('click', flipCard);
            grid.appendChild(card);
        });

        document.getElementById('menu-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'flex';
    }

    function flipCard() {
        if (lockBoard || this === firstCard || this.classList.contains('matched')) return;
        this.classList.add('flip');
        if (!firstCard) { firstCard = this; return; }
        secondCard = this;
        moves++;
        document.getElementById('moves').innerText = moves;
        checkMatch();
    }

    function checkMatch() {
        let isMatch = firstCard.dataset.icon === secondCard.dataset.icon;
        isMatch ? disableCards() : unflipCards();
    }

    function disableCards() {
        firstCard.classList.add('matched');
        secondCard.classList.add('matched');
        matchedPairs++;
        if (matchedPairs === totalPairs) setTimeout(showVictoryAnimation, 500);
        resetBoard();
    }

    function unflipCards() {
        lockBoard = true;
        setTimeout(() => {
            firstCard.classList.remove('flip');
            secondCard.classList.remove('flip');
            resetBoard();
        }, 800);
    }

    function resetBoard() { [firstCard, secondCard, lockBoard] = [null, null, false]; }
</script>

</body>
</html>
